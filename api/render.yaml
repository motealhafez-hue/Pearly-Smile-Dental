# Render (Python Web Service)
#
# Monorepo: clone includes repo root (index.html, *.html, Pictures/, …) + api/.
# main.py resolves the site root to the parent of api/ — no duplicate copy under api/public.
#
# Blueprint: repo-root render.yaml (build = "cd api && pip …", start = "sh api/start.sh").
# Standalone repo whose root IS this api/ folder: put the static site in api/public/ or
# set SITE_ROOT; build = "pip install …"; start = "sh start.sh".

services:
  - type: web
    name: psdc-api
    runtime: python
    plan: free
    autoDeploy: true
    # Persist uploaded images (blog/media) across deploys.
    disk:
      name: psdc-uploads
      mountPath: /var/data
      sizeGB: 1
    # From monorepo clone root (parent of api/).
    buildCommand: cd api && pip install --no-cache-dir -r requirements.txt
    startCommand: sh api/start.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Redirect HTTP→HTTPS (uses X-Forwarded-Proto on Render).
      - key: FORCE_HTTPS
        value: "1"
      # Store uploads on the persistent disk.
      - key: UPLOADS_DIR
        value: "/var/data/uploads"
      # Public canonical origin for sitemap / JSON-LD absolute URLs (set in dashboard to https://your-domain).
      # - key: SITE_BASE_URL
      #   value: "https://example.com"
      # Optional: comma-separated origins for browser CORS (default: same-origin only).
      # - key: CORS_ALLOW_ORIGINS
      #   value: "https://example.com,https://www.example.com"
      # Optional: override default CSP (see SecurityHeadersMiddleware in main.py).
      # - key: CONTENT_SECURITY_POLICY
      #   value: "default-src 'self'; ..."
