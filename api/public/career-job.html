<!doctype html>
<html lang="ar" dir="rtl" data-page="career_job">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/career-job.html" />
    <link rel="canonical" href="career-job.html" />
    <title>Career | Pearly Smile Dental Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="site-prefs-boot.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=careers-v2" />
  </head>
  <body>
    <header class="mobile-nav">
      <div class="brand" data-translate="brand">Pearly Smile Dental Center</div>
      <nav id="mobileNav" aria-label="Primary">
        <button type="button" class="mobile-menu-backdrop" id="mobileMenuBackdrop" aria-label="Close menu"></button>
        <div class="mobile-menu-panel" role="dialog" aria-modal="true" aria-label="Menu">
          <button type="button" class="mobile-menu-close" id="mobileMenuClose" aria-label="Close menu">
            <span aria-hidden="true">✕</span>
          </button>
          <ul>
            <li><a href="index.html" data-translate="navHome">الرئيسية</a></li>
            <li><a href="careers.html" data-cms-bound="1">الوظائف</a></li>
            <li><a href="services.html" data-translate="navServices">خدماتنا</a></li>
            <li><a href="offers.html" data-translate="navOffers">عروضنا</a></li>
            <li><a href="blog.html" data-translate="navBlog">Blog</a></li>
            <li><a href="team.html" data-translate="navTeam">فريقنا</a></li>
            <li><a href="about.html" data-translate="navAbout">عنّا</a></li>
            <li><a href="index.html#booking" data-translate="navBooking">حجز</a></li>
          </ul>
        </div>
      </nav>
      <div class="header-actions">
        <button type="button" id="mobileMenuToggle" class="mobile-menu-toggle" aria-controls="mobileNav" aria-expanded="false" aria-label="Open menu">
          <span class="mobile-menu-icon" aria-hidden="true"></span>
        </button>
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        <button type="button" id="languageToggle" class="lang-toggle">EN</button>
        <a href="tel:+97126393677" class="header-btn" data-translate="callNow">اتصل الآن</a>
      </div>
    </header>

    <main>
      <section class="hero service-detail-hero">
        <div class="hero-content">
          <p class="eyebrow eyebrow-light" data-cms-bound="1">Pearly Smile</p>
          <h1 id="jobTitle">…</h1>
          <p id="jobShort" style="max-width:72ch"></p>
          <div class="hero-actions" id="jobApplyTop"></div>
        </div>
      </section>

      <section class="job-detail">
        <div class="container">
          <div id="cms-career-job"></div>
          <div class="job-detail__grid">
            <aside class="job-detail__side">
              <div class="card glass job-side-card">
                <div class="job-side-meta" id="jobMeta"></div>
              </div>
            </aside>
            <article class="job-detail__main">
              <div class="card glass job-body-card">
                <h2 id="jobAboutTitle"></h2>
                <div id="jobDescription"></div>
                <div class="job-split">
                  <div>
                    <h3 id="jobReqTitle"></h3>
                    <div id="jobRequirements"></div>
                  </div>
                  <div>
                    <h3 id="jobBenTitle"></h3>
                    <div id="jobBenefits"></div>
                  </div>
                </div>
                <div class="job-actions" id="jobApplyBottom"></div>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="ps-footer" aria-label="Footer">
      <div class="ps-footer__inner">
        <div class="ps-footer__grid">
          <div class="ps-footer__branches" data-cms-footer-branches></div>
          <aside class="ps-footer__meta" data-cms-footer-meta></aside>
        </div>
        <div class="ps-footer__bottom">
          <span data-translate="footerText">© 2026 Pearly Smile Dental Center. جميع الحقوق محفوظة.</span>
          <span class="ps-footer__bottom-right">
            <span data-cms-footer-socials style="display:inline-flex;gap:10px;align-items:center;flex-wrap:wrap"></span>
            <span data-cms-footer-legal style="display:inline-flex;gap:10px;align-items:center;flex-wrap:wrap"></span>
          </span>
        </div>
      </div>
    </footer>

    <script src="site-data.js?v=careers-v2"></script>
    <script src="script.js"></script>
  </body>
</html>
