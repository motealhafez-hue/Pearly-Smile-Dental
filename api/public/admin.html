          shell.appendChild(toolbar);

          const listHost = document.createElement("div");
          shell.appendChild(listHost);

          const editor = document.createElement("div");
          editor.className = "card glass";
          editor.innerHTML = '<h3 class="section-title">Editor</h3>';
          root.appendChild(editor);

          let posts = [];
          let active = null;
          /** Slug of the post when editor opened — PUT must use this URL even if user renames slug in the form. */
          let activeOriginalSlug = null;

          function slugify(s) {
            s = String(s || "").trim().toLowerCase();
            let out = "";
            let dash = false;
            for (const ch of s) {
              const ok = (ch >= "a" && ch <= "z") || (ch >= "0" && ch <= "9");
              if (ok) {
                out += ch;
                dash = false;
              } else if (!dash) {
                out += "-";
                dash = true;
              }
            }
            out = out.replace(/^-+|-+$/g, "");
            return out || "post-" + Date.now();
          }

          function paintList() {
            listHost.innerHTML = "";
            const q = String(search.value || "").trim().toLowerCase();
            const rows = posts.filter((p) => {
              if (!p) return false;
              if (!q) return true;
              const hay = JSON.stringify(p).toLowerCase();
              return hay.includes(q);
            });
            if (!rows.length) {
              listHost.innerHTML = '<div class="empty-hint">No posts yet.</div>';
              return;
            }
            const tw = document.createElement("div");
            tw.className = "table-wrap";
            tw.innerHTML =
              '<table class="data-table"><thead><tr><th>Title</th><th>Slug</th><th>Tag</th><th>Status</th><th>Updated</th><th></th></tr></thead><tbody>' +
              rows
                .map((p) => {
                  const st = p.published === false ? "Draft" : "Published";
                  const title = p.title && typeof p.title === "object" ? (p.title.en || p.title.ar || "Untitled") : (p.title || "Untitled");
                  const tag = p.tag && typeof p.tag === "object" ? (p.tag.en || p.tag.ar || "—") : (p.tag || "—");
                  return (
                    "<tr>" +
                    "<td>" +
                    escapeHtml(title) +
                    "</td><td><code>" +
                    escapeHtml(p.slug || "") +
                    "</code></td><td>" +
                    escapeHtml(tag) +
                    "</td><td><span class=\"pill\">" +
                    escapeHtml(st) +
                    "</span></td><td>" +
                    escapeHtml((p.updated_at || p.published_at || "").slice(0, 10) || "—") +
                    "</td><td>" +
                    "<button type=\"button\" class=\"btn btn-ghost edit\" data-slug=\"" +
                    escapeHtml(p.slug || "") +
                    "\">Edit</button> " +
                    "<button type=\"button\" class=\"btn btn-danger del\" data-slug=\"" +
                    escapeHtml(p.slug || "") +
                    "\">Delete</button>" +
                    "</td></tr>"
                  );
                })
                .join("") +
              "</tbody></table>";
            listHost.appendChild(tw);

            tw.querySelectorAll("button.edit").forEach((b) => {
              b.addEventListener("click", () => {
                const slug = b.getAttribute("data-slug") || "";
                active = posts.find((p) => String(p.slug) === slug) || null;
                activeOriginalSlug = active ? String(active.slug) : null;
                paintEditor();
              });
            });
            tw.querySelectorAll("button.del").forEach((b) => {
              b.addEventListener("click", async () => {
                const slug = b.getAttribute("data-slug") || "";
                if (!slug) return;
                if (!confirm("Delete this post?")) return;
                try {
                  await apiAdminDeleteBlog(slug);
                  showToast("Post deleted", true);
                  posts = await apiAdminGetBlog();
                  if (active && String(active.slug) === slug) {
                    active = null;
                    activeOriginalSlug = null;
                  }
                  paintList();
                  paintEditor();
                } catch (e) {
                  showToast(e.message || "Delete failed", false);
                }
              });
            });
          }

          function editorField(label, value, onInput, opts) {
            const wrap = document.createElement("div");
            const lab = document.createElement("span");
            lab.className = "floating-label";
            lab.textContent = label;
            wrap.appendChild(lab);
            const multiline = opts && opts.multiline;
            const el = multiline ? document.createElement("textarea") : document.createElement("input");
            el.className = "field";
            if (multiline) el.style.minHeight = opts.height || "10rem";
            el.value = value != null ? String(value) : "";
            el.addEventListener("input", () => onInput(el.value));
            wrap.appendChild(el);
            return wrap;
          }

          /* ── Section divider helper ── */
          function sectionDivider(label) {
            const d = document.createElement("div");
            d.style.cssText = "display:flex;align-items:center;gap:10px;margin:1.4rem 0 0.75rem;";
            const line1 = document.createElement("div");
            line1.style.cssText = "flex:0 0 18px;height:2px;border-radius:999px;background:var(--primary);opacity:.5";
            const txt = document.createElement("span");
            txt.style.cssText = "font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;";
            txt.textContent = label;
            const line2 = document.createElement("div");
            line2.style.cssText = "flex:1;height:1px;background:var(--border-color);opacity:.6";
            d.appendChild(line1);
            d.appendChild(txt);
            d.appendChild(line2);
            return d;
          }

          /* ── SEO counter helper ── */
          function withCounter(wrap, input, ideal, max) {
            const bar = document.createElement("div");
            bar.style.cssText = "margin-top:4px;display:flex;align-items:center;gap:6px;";
            const count = document.createElement("span");
            count.style.cssText = "font-size:.72rem;font-weight:700;";
            const hint = document.createElement("span");
            hint.style.cssText = "font-size:.72rem;color:var(--text-muted);";
            hint.textContent = "ideal " + ideal + "–" + max + " chars";
            function refresh() {
              const n = (input.value || "").length;
              count.textContent = n + " chars";
              const ok = n >= ideal && n <= max;
              const warn = n > 0 && (n < ideal * 0.6 || n > max * 1.1);
              count.style.color = ok ? "var(--success-color, #10b981)" : warn ? "#f59e0b" : "var(--text-muted)";
            }
            input.addEventListener("input", refresh);
            refresh();
            bar.appendChild(count);
            bar.appendChild(hint);
            wrap.appendChild(bar);
          }

          /* ── Live HTML preview panel ── */
          function buildContentField(labelAr, labelEn, obj, lang, onInput) {
            const wrap = document.createElement("div");
            wrap.style.cssText = "display:flex;flex-direction:column;gap:6px;";
            const header = document.createElement("div");
            header.style.cssText = "display:flex;align-items:center;justify-content:space-between;";
            const lab = document.createElement("span");
            lab.className = "floating-label";
            lab.style.position = "static";
            lab.style.fontSize = ".8rem";
            lab.textContent = lang === "ar" ? labelAr : labelEn;
            const btnPrev = document.createElement("button");
            btnPrev.type = "button";
            btnPrev.textContent = "👁 Preview";
            btnPrev.style.cssText = "font-size:.72rem;padding:.2rem .6rem;border-radius:8px;border:1px solid var(--border-color);background:transparent;color:var(--text-muted);cursor:pointer;";
            header.appendChild(lab);
            header.appendChild(btnPrev);
            wrap.appendChild(header);

            const ta = document.createElement("textarea");
            ta.className = "field";
            ta.style.minHeight = "14rem";
            ta.style.fontFamily = "monospace";
            ta.style.fontSize = ".82rem";
            ta.value = (obj && obj[lang]) || "";
            ta.addEventListener("input", () => { onInput(lang, ta.value); updatePreview(); });
            wrap.appendChild(ta);

            const preview = document.createElement("div");
            preview.hidden = true;
            preview.style.cssText = "border:1px solid var(--border-color);border-radius:12px;padding:1rem 1.25rem;background:var(--bg-secondary, rgba(0,0,0,.04));font-size:.95rem;line-height:1.75;color:var(--text);";
            wrap.appendChild(preview);

            function updatePreview() {
              if (!preview.hidden) preview.innerHTML = ta.value || "<em style='color:var(--text-muted)'>Empty</em>";
            }
            btnPrev.addEventListener("click", () => {
              preview.hidden = !preview.hidden;
              btnPrev.textContent = preview.hidden ? "👁 Preview" : "✕ Close";
              updatePreview();
            });
            return wrap;
          }

          function paintEditor() {
            editor.innerHTML = '<h3 class="section-title">Editor</h3>';
            if (!active) {
              editor.innerHTML +=
                '<div class="empty-hint">Select a post to edit, or create a new one.</div>';
              return;
            }

            const row = active;

            /* ── Core fields ── */
            editor.appendChild(sectionDivider("Post info"));

            const grid = document.createElement("div");
            grid.className = "row-2";
            grid.appendChild(
              textLang("Title · AR", "Title · EN", row.title || { ar: "", en: "" }, (lang, val) => {
                if (!row.title || typeof row.title !== "object") row.title = { ar: "", en: "" };
                row.title[lang] = val;
                if (!row.slug) row.slug = slugify(row.title.en || row.title.ar || "");
              })
            );
            const slugWrap = editorField("Slug (URL)", row.slug || "", (v) => { row.slug = slugify(v); });
            slugWrap.querySelector("input,textarea").style.fontFamily = "monospace";
            slugWrap.querySelector("input,textarea").style.fontSize = ".88rem";
            grid.appendChild(slugWrap);
            editor.appendChild(grid);

            editor.appendChild(
              textLang("Excerpt · AR", "Excerpt · EN", row.excerpt || { ar: "", en: "" }, (lang, val) => {
                if (!row.excerpt || typeof row.excerpt !== "object") row.excerpt = { ar: "", en: "" };
                row.excerpt[lang] = val;
              })
            );

            const grid2 = document.createElement("div");
            grid2.className = "row-2";
            grid2.appendChild(
              textLang("Tag · AR", "Tag · EN", row.tag || { ar: "", en: "" }, (lang, val) => {
                if (!row.tag || typeof row.tag !== "object") row.tag = { ar: "", en: "" };
                row.tag[lang] = val;
              })
            );
            grid2.appendChild(
              editorField("Read time (min)", row.read_time || "", (v) => { row.read_time = Number(v) || null; })
            );
            editor.appendChild(grid2);

            /* ── Hero image ── */
            editor.appendChild(sectionDivider("Hero image"));

            const imgUrlWrap = editorField("Image URL", row.hero_image || "", (v) => { row.hero_image = v; });
            const imgInput = imgUrlWrap.querySelector("input,textarea");
            /* live thumbnail */
            const imgThumb = document.createElement("img");
            imgThumb.style.cssText =
              "display:none;max-width:min(100%,420px);max-height:160px;width:auto;height:auto;border-radius:8px;margin-top:6px;object-fit:contain;border:1px solid var(--border-color);";
            function refreshThumb() {
              const s = (imgInput.value || "").trim();
              if (s) {
                imgThumb.src = s;
                imgThumb.style.display = "block";
              } else {
                imgThumb.style.display = "none";
                imgThumb.removeAttribute("src");
              }
            }
            imgInput.addEventListener("input", refreshThumb);
            refreshThumb();
            imgUrlWrap.appendChild(imgThumb);
            editor.appendChild(imgUrlWrap);

            (function () {
              let focalWrap = null;
              const up = createImageUploader({
                label: "Upload hero image",
                size: { w: 160, h: 100 },
                maxPreview: { w: 480, h: 320 },
                get: () => row.hero_image,
                set: (v) => { row.hero_image = v; imgInput.value = v; refreshThumb(); },
                focal: {
                  refresh: () => {
                    if (focalWrap && focalWrap.refreshFocal) focalWrap.refreshFocal();
                  },
                },
              });
              up.classList.add("item");
              editor.appendChild(up);
              focalWrap = mountHeroFocalStudio(row, function () {
                return (row.hero_image || "").trim();
              });
              focalWrap.classList.add("item");
              editor.appendChild(focalWrap);
              const _refreshThumb = refreshThumb;
              refreshThumb = function () {
                _refreshThumb();
                if (focalWrap.refreshFocal) focalWrap.refreshFocal();
              };
              refreshThumb();
            })();

            /* ── SEO ── */
            editor.appendChild(sectionDivider("SEO metadata"));

            const mtWrap = textLang("Meta title · AR", "Meta title · EN", row.meta_title || { ar: "", en: "" }, (lang, val) => {
              if (!row.meta_title || typeof row.meta_title !== "object") row.meta_title = { ar: "", en: "" };
              row.meta_title[lang] = val;
            });
            editor.appendChild(mtWrap);

            const mdWrap = textLang("Meta description · AR", "Meta description · EN", row.meta_description || { ar: "", en: "" }, (lang, val) => {
              if (!row.meta_description || typeof row.meta_description !== "object") row.meta_description = { ar: "", en: "" };
              row.meta_description[lang] = val;
            });
            /* add SEO counter to each meta-desc textarea */
            mdWrap.querySelectorAll("textarea,input").forEach((inp) => withCounter(inp.parentElement, inp, 120, 160));
            editor.appendChild(mdWrap);

            editor.appendChild(
              editorField(
                "Related post slugs (comma-separated)",
                Array.isArray(row.related_slugs) ? row.related_slugs.join(", ") : "",
                (v) => {
                  row.related_slugs = String(v || "").split(",").map((s) => s.trim()).filter(Boolean);
                }
              )
            );

            /* ── Publish toggle ── */
            editor.appendChild(sectionDivider("Visibility"));

            const pubRow = document.createElement("div");
            pubRow.className = "toolbar-inline";
            pubRow.style.alignItems = "center";
            const chk = document.createElement("input");
            chk.type = "checkbox";
            chk.checked = row.published !== false;
            chk.style.width = "18px";
            chk.style.height = "18px";
            chk.style.accentColor = "var(--primary)";
            const lbl = document.createElement("span");
            lbl.style.color = "var(--text-muted)";
            lbl.style.fontSize = ".9rem";
            lbl.textContent = "Published (visible on public blog)";
            chk.addEventListener("change", () => { row.published = chk.checked; });
            pubRow.appendChild(chk);
            pubRow.appendChild(lbl);
            editor.appendChild(pubRow);

            /* ── Content HTML ── */
            editor.appendChild(sectionDivider("Article content (HTML)"));

            const hint = document.createElement("p");
            hint.style.cssText = "font-size:.8rem;color:var(--text-muted);margin:0 0 .75rem;line-height:1.55;";
            hint.innerHTML = "Use semantic HTML: <code>&lt;h2&gt;</code>, <code>&lt;h3&gt;</code>, <code>&lt;p&gt;</code>, <code>&lt;ul&gt;</code>, <code>&lt;blockquote&gt;</code>, <code>&lt;img&gt;</code>. Images will be rendered with rounded corners.";
            editor.appendChild(hint);

            const cObj = row.content_html || { ar: "", en: "" };
            const cfAr = buildContentField("المحتوى (HTML) · عربي", "Content (HTML) · AR", cObj, "ar", (lang, val) => {
              if (!row.content_html || typeof row.content_html !== "object") row.content_html = { ar: "", en: "" };
              row.content_html[lang] = val;
            });
            const cfEn = buildContentField("Content (HTML) · English", "Content (HTML) · EN", cObj, "en", (lang, val) => {
              if (!row.content_html || typeof row.content_html !== "object") row.content_html = { ar: "", en: "" };
              row.content_html[lang] = val;
            });
            editor.appendChild(cfAr);
            editor.appendChild(cfEn);

            /* ── Actions ── */
            editor.appendChild(sectionDivider("Actions"));

            const actions = document.createElement("div");
            actions.className = "toolbar-inline";

            const btnSavePost = document.createElement("button");
            btnSavePost.type = "button";
            btnSavePost.className = "btn btn-primary";
            btnSavePost.textContent = "💾 Save post";

            const btnPreview = document.createElement("a");
            btnPreview.className = "btn btn-ghost";
            btnPreview.textContent = "🔗 Open preview";
            btnPreview.href = apiBase + "/blog/" + encodeURIComponent(row.slug || "");
            btnPreview.target = "_blank";
            btnPreview.rel = "noreferrer";
            btnPreview.title = "Preview opens the public blog-post.html page — save first to see latest changes.";

            const statusBadge = document.createElement("span");
            statusBadge.style.cssText = "font-size:.78rem;font-weight:700;padding:.25rem .7rem;border-radius:999px;margin-inline-start:auto;";
            const isPub = row.published !== false;
            statusBadge.textContent = isPub ? "● Published" : "● Draft";
            statusBadge.style.background = isPub ? "rgba(16,185,129,.14)" : "rgba(245,158,11,.14)";
            statusBadge.style.color = isPub ? "#059669" : "#d97706";

            btnSavePost.addEventListener("click", async () => {
              btnSavePost.disabled = true;
              btnSavePost.textContent = "Saving…";
              /* Spread row first, then explicit fields so checkbox + slug win (Object.assign(defaults, row) let row overwrite published wrongly). */
              const payload = Object.assign({}, row, {
                slug: row.slug || slugify((row.title && (row.title.en || row.title.ar)) || ""),
                title: row.title || { ar: "بدون عنوان", en: "Untitled" },
                excerpt: row.excerpt || { ar: "", en: "" },
                tag: row.tag || { ar: "", en: "" },
                read_time: row.read_time != null ? row.read_time : null,
                hero_image: row.hero_image != null ? row.hero_image : null,
                hero_focal_x: (function () {
                  if (row.hero_focal_x == null || row.hero_focal_x === "") return null;
                  var n = Number(row.hero_focal_x);
                  return Number.isFinite(n) ? Math.min(100, Math.max(0, n)) : null;
                })(),
                hero_focal_y: (function () {
                  if (row.hero_focal_y == null || row.hero_focal_y === "") return null;
                  var n = Number(row.hero_focal_y);
                  return Number.isFinite(n) ? Math.min(100, Math.max(0, n)) : null;
                })(),
                meta_title: row.meta_title || { ar: "", en: "" },
                meta_description: row.meta_description || { ar: "", en: "" },
                content_html: row.content_html || { ar: "", en: "" },
                related_slugs: Array.isArray(row.related_slugs) ? row.related_slugs : [],
                published: Boolean(chk.checked),
                published_at: row.published_at || null,
                updated_at: row.updated_at || null,
              });

              try {
                const isNewPost = activeOriginalSlug === null;
                if (isNewPost) {
                  await apiAdminCreateBlog(payload);
                } else {
                  await apiAdminUpdateBlog(activeOriginalSlug, payload);
                }
                showToast("Post saved ✓", true);
                btnPreview.href = apiBase + "/blog/" + encodeURIComponent(payload.slug || "");
                posts = await apiAdminGetBlog();
                active = posts.find((p) => p && String(p.slug) === String(payload.slug)) || null;
                activeOriginalSlug = active ? String(active.slug) : null;
                paintList();
                paintEditor();
              } catch (e) {
                showToast(e.message || "Save failed", false);
                btnSavePost.disabled = false;
                btnSavePost.textContent = "💾 Save post";
              }
            });

            actions.appendChild(btnSavePost);
            actions.appendChild(btnPreview);
            actions.appendChild(statusBadge);
            editor.appendChild(actions);
          }

        function renderAnalytics(root) {
          setPageHead("Analytics", "Sessions, journeys, and bookings — optimized for decisions.");
          root.innerHTML = "";

          const toolbar = document.createElement("div");

          if (window.__psAnalyticsRefresh) {

          window.__psAnalyticsRefresh = setInterval(() => {
            if (typeof activeRoute !== "undefined" && activeRoute !== "analytics") {

          const host = document.createElement("div");
          host.className = "analytics-loading";
          host.innerHTML = '<div class="card glass"><div class="empty-hint">Loading events…</div></div>';
          root.appendChild(host);

          function isoDayUtc(iso) {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return "";
            const y = d.getUTCFullYear();
            const m = String(d.getUTCMonth() + 1).padStart(2, "0");
            const dd = String(d.getUTCDate()).padStart(2, "0");
            return y + "-" + m + "-" + dd;
          }

          function drawLine(canvas, labels, values, color) {
            const ctx = canvas.getContext("2d");
            if (!ctx) return;
            const w = canvas.width;
            const h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            const pad = 18;
            const max = Math.max(1, ...values);
            const n = Math.max(2, values.length);
            const xFor = (i) => pad + (i * (w - pad * 2)) / (n - 1);
            const yFor = (v) => h - pad - (v * (h - pad * 2)) / (max || 1);

            ctx.strokeStyle = "rgba(148,163,184,0.18)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(pad, h - pad);
            ctx.lineTo(w - pad, h - pad);
            ctx.stroke();

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            values.forEach((v, i) => {
              const x = xFor(i);
              const y = yFor(v);
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            });
            ctx.stroke();

            ctx.fillStyle = color;
            values.forEach((v, i) => {
              const x = xFor(i);
              const y = yFor(v);
              ctx.beginPath();
              ctx.arc(x, y, 2.5, 0, Math.PI * 2);
              ctx.fill();
            });

            ctx.fillStyle = "rgba(148,163,184,0.85)";
            ctx.font = "12px Inter, system-ui, sans-serif";
            if (labels.length) {
              ctx.fillText(String(labels[0]), pad, h - 4);
              const last = String(labels[labels.length - 1]);
              const tw = ctx.measureText(last).width;
              ctx.fillText(last, w - pad - tw, h - 4);
            }
          }

          function lastNDaysSeries(map, n) {
            const days = [];
            const vals = [];
            const now = new Date();
            for (let i = n - 1; i >= 0; i--) {
              const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
              d.setUTCDate(d.getUTCDate() - i);
              const key = isoDayUtc(d.toISOString());
              days.push(key.slice(5));
              vals.push(map[key] || 0);
            }
            return { days, vals };
          }

          function pct(n, d) {
            if (!d) return 0;
            return (n / d) * 100;
          }

          function fmtMs(ms) {
            if (!Number.isFinite(ms) || ms < 0) return "—";
            const s = Math.round(ms / 1000);
            const m = Math.floor(s / 60);
            const h = Math.floor(m / 60);
            const mm = m % 60;
            const ss = s % 60;
            if (h > 0) return h + "h " + String(mm).padStart(2, "0") + "m";
            if (m > 0) return m + "m " + String(ss).padStart(2, "0") + "s";
            return ss + "s";
          }

          function avg(arr) {
            if (!arr || !arr.length) return NaN;
            let sum = 0;
            for (let i = 0; i < arr.length; i++) sum += arr[i];
            return sum / arr.length;
          }

          function normPath(p) {
            return String(p || "").trim().toLowerCase();
          }

          apiGetEvents()
            .then((events) => {
              host.innerHTML = "";
              host.className = "analytics-page";

              const sessions = new Set();
              let totalEvents = 0;
              let pageViews = 0;
              const pageCounts = Object.create(null);
              const doctorClicks = Object.create(null);
              const serviceClicks = Object.create(null);
              const offerViews = Object.create(null);
              let offerViewEvents = 0;
              const bookingCompletedSessions = new Set();
              const dailyEvents = Object.create(null);
              const dailyPageViews = Object.create(null);
              const perSessionEvents = Object.create(null);
              const sessionDaySets = Object.create(null);
              const hourPvCounts = new Array(24).fill(0);
              const dowPvCounts = new Array(7).fill(0);

              (events || []).forEach((ev) => {
                if (!ev || typeof ev !== "object") return;
                totalEvents += 1;
                const sidRaw = ev.session_id ? String(ev.session_id) : "";
                if (sidRaw) sessions.add(sidRaw);

                const day = isoDayUtc(ev.timestamp || "");
                const ts = Date.parse(String(ev.timestamp || ""));
                if (sidRaw && day) {
                  const set = sessionDaySets[sidRaw] || (sessionDaySets[sidRaw] = new Set());
                  set.add(day);
                }

                if (ev.type === "page_view") {
                  pageViews += 1;
                  const p = String(ev.page || "unknown");
                  pageCounts[p] = (pageCounts[p] || 0) + 1;
                  if (day) dailyPageViews[day] = (dailyPageViews[day] || 0) + 1;
                  if (!Number.isNaN(ts)) {
                    const dt = new Date(ts);
                    hourPvCounts[dt.getHours()] += 1;
                    dowPvCounts[dt.getDay()] += 1;
                  }
                }
                if (ev.type === "doctor_click") {
                  const d = String(ev.doctor || "Unknown").trim();
                  doctorClicks[d] = (doctorClicks[d] || 0) + 1;
                }
                if (ev.type === "service_click") {
                  const s = String(ev.service || "Unknown").trim();
                  serviceClicks[s] = (serviceClicks[s] || 0) + 1;
                }
                if (ev.type === "offer_view") {
                  offerViewEvents += 1;
                  const oid = String(ev.offer_id || "unknown").trim();
                  offerViews[oid] = (offerViews[oid] || 0) + 1;
                }
                if (ev.type === "booking_completed" && sidRaw) {
                  bookingCompletedSessions.add(sidRaw);
                }

                if (day) dailyEvents[day] = (dailyEvents[day] || 0) + 1;

                if (sidRaw && !Number.isNaN(ts)) {
                  (perSessionEvents[sidRaw] || (perSessionEvents[sidRaw] = [])).push({
                    type: String(ev.type || ""),
                    ts,
                  });
                }
              });

              const totalSessions = sessions.size;
              const totalBookings = bookings.length;
              const conversionRate = totalSessions ? totalBookings / totalSessions : 0;
              const dropOffRate = totalSessions ? (totalSessions - bookingCompletedSessions.size) / totalSessions : 0;

              let repeatDaySessions = 0;
              let singleDaySessions = 0;
              Object.keys(sessionDaySets).forEach((sid) => {
                const st = sessionDaySets[sid];
                if (!st || !st.size) return;
                if (st.size > 1) repeatDaySessions += 1;
                else singleDaySessions += 1;
              });

              function countPageViewsIf(pred) {
                let n = 0;
                (events || []).forEach((ev2) => {
                  if (!ev2 || ev2.type !== "page_view") return;
                  if (pred(normPath(ev2.page))) n += 1;
                });
                return n;
              }
              const kpiOffersPageViews = countPageViewsIf((p) => p.includes("offers"));
              const kpiServicesPageViews = countPageViewsIf((p) => p.includes("services") || p.includes("service-"));
              const kpiBlogPageViews = countPageViewsIf((p) => p.includes("blog"));

              const strict = {
                step1: new Set(),
                step2: new Set(),
                step3: new Set(),
                step4: new Set(),
                times: Object.create(null),
              };

              Object.keys(perSessionEvents).forEach((sid) => {
                const evs = perSessionEvents[sid];
                if (!Array.isArray(evs) || evs.length === 0) return;
                evs.sort((a, b) => a.ts - b.ts);

                let pv = null;
                let dc = null;
                let bs = null;
                let bc = null;

                for (let i = 0; i < evs.length; i++) {
                  const e = evs[i];
                  if (!pv && e.type === "page_view") {
                    pv = e.ts;
                    continue;
                  }
                  if (pv && !dc && e.type === "doctor_click" && e.ts >= pv) {
                    dc = e.ts;
                    continue;
                  }
                  if (dc && !bs && e.type === "booking_started" && e.ts >= dc) {
                    bs = e.ts;
                    continue;
                  }
                  if (bs && !bc && e.type === "booking_completed" && e.ts >= bs) {
                    bc = e.ts;
                    break;
                  }
                }

                if (pv) {
                  strict.step1.add(sid);
                  strict.times[sid] = { pv, dc, bs, bc };
                }
                if (pv && dc) strict.step2.add(sid);
                if (pv && dc && bs) strict.step3.add(sid);
                if (pv && dc && bs && bc) strict.step4.add(sid);
              });

              const funnelBase = strict.step1.size;
              const funnelSteps = [
                { key: "page_view", short: "Page view", sessions: strict.step1 },
                { key: "doctor_click", short: "Doctor click", sessions: strict.step2 },
                { key: "booking_started", short: "Booking started", sessions: strict.step3 },
                { key: "booking_completed", short: "Completed", sessions: strict.step4 },
              ];

              const bookingsPerDoctor = Object.create(null);
              const bookingsPerService = Object.create(null);
              const dailyBookings = Object.create(null);

              bookings.forEach((b) => {
                const d = String(b.doctor || "Unknown").trim();
                bookingsPerDoctor[d] = (bookingsPerDoctor[d] || 0) + 1;
                const s = String(b.service || "Unknown").trim();
                bookingsPerService[s] = (bookingsPerService[s] || 0) + 1;
                const day = (b.date || "").trim() || isoDayUtc(b.timestamp || "");
                if (day) dailyBookings[day] = (dailyBookings[day] || 0) + 1;
              });

              const durations = { pv_to_dc: [], dc_to_bs: [], bs_to_bc: [], pv_to_bc: [] };
              const completedRows = [];
              strict.step4.forEach((sid) => {
                const t = strict.times[sid];
                if (!t || !t.pv || !t.dc || !t.bs || !t.bc) return;
                durations.pv_to_dc.push(t.dc - t.pv);
                durations.dc_to_bs.push(t.bs - t.dc);
                durations.bs_to_bc.push(t.bc - t.bs);
                durations.pv_to_bc.push(t.bc - t.pv);
                completedRows.push({ sid, total: t.bc - t.pv });
              });
              completedRows.sort((a, b) => a.total - b.total);
              const fastest = completedRows[0] || null;
              const slowest = completedRows.length ? completedRows[completedRows.length - 1] : null;

              const peakHourIdx = hourPvCounts.indexOf(Math.max(...hourPvCounts));
              const dowLabels = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
              const peakDowIdx = dowPvCounts.indexOf(Math.max(...dowPvCounts));

              const docAll = Array.from(new Set([...Object.keys(doctorClicks), ...Object.keys(bookingsPerDoctor)])).map((name) => ({
                name,
                clicks: doctorClicks[name] || 0,
                bookings: bookingsPerDoctor[name] || 0,
              }));
              const topDoctor =
                [...docAll].sort((a, b) => b.clicks + b.bookings * 3 - (a.clicks + a.bookings * 3))[0] || null;
              const topOfferEntry = Object.entries(offerViews).sort((a, b) => b[1] - a[1])[0] || null;

              const clicked = strict.step2.size;
              const completedStrict = strict.step4.size;
              const clickToComplete = clicked ? completedStrict / clicked : 0;
              const viewToComplete = funnelBase ? completedStrict / funnelBase : 0;

              const d1 = pct(strict.step1.size - strict.step2.size, strict.step1.size);
              const d2 = pct(strict.step2.size - strict.step3.size, strict.step2.size);
              const d3 = pct(strict.step3.size - strict.step4.size, strict.step3.size);
              const drops = [
                { key: "visit→click", label: "Visited → no doctor click", value: d1 },
                { key: "click→start", label: "Doctor click → no booking start", value: d2 },
                { key: "start→complete", label: "Booking started → no completion", value: d3 },
              ].filter((x) => Number.isFinite(x.value));
              drops.sort((a, b) => b.value - a.value);
              const worstDrop = drops[0] || null;

              const insights = [];
              const recs = [];
              function sevStyle(sev) {
                if (sev === "red") return "background:rgba(248,113,113,0.12);color:var(--danger);border:1px solid rgba(248,113,113,0.25)";
                if (sev === "yellow") return "background:rgba(251,191,36,0.12);color:var(--warning);border:1px solid rgba(251,191,36,0.25)";
                return "background:rgba(74,222,128,0.12);color:var(--success);border:1px solid rgba(74,222,128,0.25)";
              }

              if (clicked >= 20 && clickToComplete < 0.2) {
                insights.push({
                  sev: "red",
                  title: "Conversion issue",
                  text: "Doctor clicks are high but completed journeys are low. Strengthen trust after interest.",
                });
                recs.push("Improve doctor profiles and make the booking CTA impossible to miss.");
              } else if (clicked >= 10 && clickToComplete < 0.35) {
                insights.push({
                  sev: "yellow",
                  title: "Conversion opportunity",
                  text: "Many users click doctors but fewer finish — small UX wins could lift bookings.",
                });
                recs.push("Reduce booking friction: fewer fields, clearer defaults, inline validation.");
              } else if (clicked >= 10 && clickToComplete >= 0.35) {
                insights.push({ sev: "green", title: "Healthy funnel", text: "Doctor interest often converts to completion." });
              }

              const totalServiceClicks = Object.values(serviceClicks).reduce((a, b) => a + b, 0);
              const serviceToBooking = totalServiceClicks ? totalBookings / totalServiceClicks : 0;
              if (totalServiceClicks >= 30 && serviceToBooking < 0.08) {
                insights.push({
                  sev: "red",
                  title: "Service interest gap",
                  text: "Services get clicks but bookings stay low — clarify value and next step.",
                });
                recs.push("Add pricing hints, duration, and a direct ‘Book this service’ action.");
              } else if (totalServiceClicks >= 15 && serviceToBooking < 0.15) {
                insights.push({
                  sev: "yellow",
                  title: "Service clarity",
                  text: "Service engagement is decent; bookings could rise with clearer offers.",
                });
              }

              if (offerViewEvents >= 25 && funnelBase >= 30 && viewToComplete < 0.08) {
                insights.push({
                  sev: "yellow",
                  title: "Offers vs completions",
                  text: "Offers get impressions but strict completions are rare — tighten CTAs from offer to booking.",
                });
                recs.push("Preset doctor/service on booking when coming from an offer card.");
              }

              if (worstDrop && funnelBase) {
                const sev = worstDrop.value >= 55 ? "red" : worstDrop.value >= 35 ? "yellow" : "green";
                insights.push({
                  sev,
                  title: "Largest drop-off",
                  text: worstDrop.label + " (" + worstDrop.value.toFixed(1) + "%).",
                });
                if (worstDrop.key === "visit→click") recs.push("Surface doctors earlier with proof and clear prompts.");
                else if (worstDrop.key === "click→start") recs.push("Auto-open booking with the chosen doctor selected.");
                else if (worstDrop.key === "start→complete") recs.push("Simplify the final booking steps on mobile.");
              }

              const seen = new Set();
              const finalRecs = [];
              recs.forEach((r) => {
                const key = String(r).trim();
                if (!key || seen.has(key)) return;
                seen.add(key);
                finalRecs.push(key);
              });

              const aiBullets = [];
              if (topDoctor && (topDoctor.clicks || topDoctor.bookings)) {
                aiBullets.push(
                  "<strong>" +
                    escapeHtml(topDoctor.name) +
                    "</strong> is getting the most attention (" +
                    escapeHtml(String(topDoctor.clicks)) +
                    " clicks, " +
                    escapeHtml(String(topDoctor.bookings)) +
                    " bookings)."
                );
              }
              if (worstDrop && worstDrop.value >= 25) {
                aiBullets.push("Users tend to drop off at <strong>" + escapeHtml(worstDrop.label.toLowerCase()) + "</strong>.");
              }
              if (topOfferEntry) {
                aiBullets.push(
                  "Offer <strong>" + escapeHtml(topOfferEntry[0]) + "</strong> has the most views (" + escapeHtml(String(topOfferEntry[1])) + ")."
                );
              }
              if (repeatDaySessions + singleDaySessions > 0) {
                aiBullets.push(
                  "<strong>" +
                    escapeHtml(String(repeatDaySessions)) +
                    "</strong> sessions span multiple days vs <strong>" +
                    escapeHtml(String(singleDaySessions)) +
                    "</strong> single-day journeys (tracked sessions)."
                );
              }
              if (completedRows.length && Number.isFinite(avg(durations.pv_to_bc))) {
                aiBullets.push(
                  "Average time from first page view to completed booking is <strong>" +
                    escapeHtml(fmtMs(avg(durations.pv_to_bc))) +
                    "</strong>."
                );
              }

              function escAttr(s) {
                return String(s)
                  .replace(/&/g, "&amp;")
                  .replace(/"/g, "&quot;")
                  .replace(/</g, "&lt;")
                  .replace(/>/g, "&gt;");
              }

              function cssBarsFromArray(arr, labels, title, maxH) {
                const max = Math.max(1, ...arr);
                let inner = "";
                for (let i = 0; i < arr.length; i++) {
                  const v = arr[i];
                  const w = (v / max) * 100;
                  inner +=
                    '<div class="analytics-css-bar"><span>' +
                    escapeHtml(labels[i]) +
                    '</span><div class="track"><div class="fill" style="width:' +
                    escAttr(w.toFixed(1)) +
                    '%"></div></div><span>' +
                    escapeHtml(String(v)) +
                    "</span></div>";
                }
                return (
                  '<div class="analytics-mini-stat" style="margin:0;border:0;padding:0;background:transparent">' +
                  '<div class="floating-label">' +
                  escapeHtml(title) +
                  '</div><div class="analytics-css-bars" style="max-height:' +
                  escAttr(String(maxH || 220)) +
                  'px;overflow-y:auto;margin-top:0.5rem">' +
                  inner +
                  "</div></div>"
                );
              }

              const hourLabels = [];
              for (let h = 0; h < 24; h++) hourLabels.push(h + "h");

              let funnelHtml = "";
              if (!funnelBase) {
                funnelHtml = '<div class="empty-hint">No page views tracked yet.</div>';
              } else {
                const parts = [];
                funnelSteps.forEach((step, idx) => {
                  const count = step.sessions.size;
                  const overallRate = pct(count, funnelBase);
                  parts.push(
                    '<div class="analytics-funnel-step"><div class="analytics-funnel-step__n">' +
                      escapeHtml(String(count)) +
                      '</div><div class="analytics-funnel-step__l">' +
                      escapeHtml(step.short) +
                      '</div><div class="analytics-funnel-step__pct">' +
                      escapeHtml(overallRate.toFixed(1) + "% of sessions") +
                      "</div></div>"
                  );
                  if (idx < funnelSteps.length - 1) {
                    parts.push('<span class="analytics-funnel-arrow" aria-hidden="true">→</span>');
                  }
                });
                funnelHtml =
                  '<div class="analytics-funnel-rail">' +
                  parts.join("") +
                  "</div>" +
                  '<p style="margin:0.85rem 0 0;font-size:0.82rem;color:var(--text-muted)">Strict order: page_view → doctor_click → booking_started → booking_completed</p>' +
                  '<div style="margin-top:0.75rem;display:flex;flex-wrap:wrap;gap:0.45rem;align-items:center;font-size:0.82rem;color:var(--text-muted)">' +
                  '<span class="pill">' +
                  escapeHtml(d1.toFixed(1) + "%") +
                  '</span> no doctor click · <span class="pill">' +
                  escapeHtml(d2.toFixed(1) + "%") +
                  '</span> no booking start · <span class="pill">' +
                  escapeHtml(d3.toFixed(1) + "%") +
                  "%</span> no completion</div>";
              }

              const secKpi = document.createElement("section");
              secKpi.className = "analytics-section";
              secKpi.innerHTML =
                '<header class="analytics-section-head"><h2 class="analytics-section-title">Overview</h2>' +
                '<p class="analytics-section-desc">Bookings vs sessions and funnel completion from tracked events.</p></header>' +
                '<div class="grid-kpi analytics-kpi-hero">' +
                '<article class="kpi-card glass"><span class="kpi-ico" aria-hidden="true">👥</span><div class="label">Total sessions</div><div class="value">' +
                escapeHtml(String(totalSessions)) +
                '</div><div class="hint">Unique session_id values</div></article>' +
                '<article class="kpi-card glass"><span class="kpi-ico" aria-hidden="true">👁</span><div class="label">Total page views</div><div class="value">' +
                escapeHtml(String(pageViews)) +
                '</div><div class="hint">page_view events</div></article>' +
                '<article class="kpi-card glass"><span class="kpi-ico" aria-hidden="true">📅</span><div class="label">Total bookings</div><div class="value">' +
                escapeHtml(String(totalBookings)) +
                '</div><div class="hint">Records in bookings.json</div></article>' +
                '<article class="kpi-card glass"><span class="kpi-ico" aria-hidden="true">📈</span><div class="label">Conversion rate</div><div class="value">' +
                escapeHtml((conversionRate * 100).toFixed(1) + "%") +
                '</div><div class="hint">Bookings ÷ sessions</div></article>' +
                '<article class="kpi-card glass"><span class="kpi-ico" aria-hidden="true">📉</span><div class="label">Drop-off rate</div><div class="value">' +
                escapeHtml((dropOffRate * 100).toFixed(1) + "%") +
                '</div><div class="hint">Sessions without booking_completed event</div></article>' +
                "</div>";
              host.appendChild(secKpi);

              const secCharts = document.createElement("section");
              secCharts.className = "analytics-section";
              const evCanvas = document.createElement("canvas");
              evCanvas.width = 640;
              evCanvas.height = 200;
              evCanvas.setAttribute("aria-label", "Daily page views last 14 days");
              const bkCanvas = document.createElement("canvas");
              bkCanvas.width = 640;
              bkCanvas.height = 200;
              bkCanvas.setAttribute("aria-label", "Daily bookings last 14 days");
              const chartWrap = document.createElement("div");
              chartWrap.className = "analytics-grid-2";
              chartWrap.innerHTML =
                '<div class="card glass analytics-chart-panel"><h3 class="section-title">Daily traffic</h3>' +
                '<p style="margin:-0.35rem 0 0.65rem;font-size:0.82rem;color:var(--text-muted)">Page views — last 14 days (local dates)</p></div>' +
                '<div class="card glass analytics-chart-panel"><h3 class="section-title">Daily bookings</h3>' +
                '<p style="margin:-0.35rem 0 0.65rem;font-size:0.82rem;color:var(--text-muted)">From booking records — last 14 days</p></div>';
              const panels = chartWrap.querySelectorAll(".analytics-chart-panel");
              panels[0].appendChild(evCanvas);
              panels[1].appendChild(bkCanvas);
              secCharts.innerHTML =
                '<header class="analytics-section-head"><h2 class="analytics-section-title">Traffic & bookings</h2>' +
                '<p class="analytics-section-desc">Spot spikes and gaps over the past two weeks.</p></header>';
              secCharts.appendChild(chartWrap);
              host.appendChild(secCharts);

              const pvSeries = lastNDaysSeries(dailyPageViews, 14);
              const bkSeries = lastNDaysSeries(dailyBookings, 14);
              drawLine(evCanvas, pvSeries.days, pvSeries.vals, "rgba(56,189,248,0.95)");
              drawLine(bkCanvas, bkSeries.days, bkSeries.vals, "rgba(74,222,128,0.95)");

              const secFunnel = document.createElement("section");
              secFunnel.className = "analytics-section";
              secFunnel.innerHTML =
                '<header class="analytics-section-head"><h2 class="analytics-section-title">Conversion funnel</h2>' +
                '<p class="analytics-section-desc">Sessions that progress through each step in order.</p></header>' +
                '<div class="card glass">' +
                funnelHtml +
                "</div>";
              host.appendChild(secFunnel);

              const secPatterns = document.createElement("section");
              secPatterns.className = "analytics-section";
              secPatterns.innerHTML =
                '<header class="analytics-section-head"><h2 class="analytics-section-title">Timing & patterns</h2>' +
                '<p class="analytics-section-desc">Peak traffic from page views; journey speed when the strict funnel completes.</p></header>' +
                '<div class="analytics-grid-2">' +
                '<div class="card glass">' +
                cssBarsFromArray(hourPvCounts, hourLabels, "Peak traffic by hour (page views, local time)", 260) +
                "</div>" +
                '<div class="card glass">' +
                cssBarsFromArray(dowPvCounts, dowLabels, "Traffic by weekday (page views)", 220) +
                "</div></div>";
              host.appendChild(secPatterns);

              const subKpiHtml =
                '<div class="analytics-sub-kpi">' +
                '<div class="analytics-mini-stat"><div class="lbl">Sessions · multi-day</div><div class="val">' +
                escapeHtml(String(repeatDaySessions)) +
                '</div><div style="margin-top:0.35rem;font-size:0.78rem;color:var(--text-muted)">Returned on another day</div></div>' +
                '<div class="analytics-mini-stat"><div class="lbl">Sessions · single day</div><div class="val">' +
                escapeHtml(String(singleDaySessions)) +
                '</div><div style="margin-top:0.35rem;font-size:0.78rem;color:var(--text-muted)">One calendar day</div></div>' +
                '<div class="analytics-mini-stat"><div class="lbl">Strict funnel completion</div><div class="val">' +
                escapeHtml(funnelBase ? ((strict.step4.size / funnelBase) * 100).toFixed(1) + "%" : "—") +
                '</div><div style="margin-top:0.35rem;font-size:0.78rem;color:var(--text-muted)">Sessions hitting all four steps</div></div>' +
                '<div class="analytics-mini-stat"><div class="lbl">Peak hour / day</div><div class="val">' +
                escapeHtml(String(peakHourIdx) + "h · " + dowLabels[peakDowIdx]) +
                '</div><div style="margin-top:0.35rem;font-size:0.78rem;color:var(--text-muted)">By page views</div></div>' +
                "</div>";

              const timeInner =
                !completedRows.length
                  ? '<div class="empty-hint">No completed strict funnel yet.</div>'
                  : '<div class="analytics-grid-2" style="margin-top:0.5rem">' +
                    '<div><div class="floating-label">Avg page_view → booking_completed</div><div style="font-family:var(--font-display);font-size:1.35rem;font-weight:700;margin-top:0.25rem">' +
                    escapeHtml(fmtMs(avg(durations.pv_to_bc))) +
                    "</div></div>" +
                    '<div style="font-size:0.88rem;line-height:1.65;color:var(--text-muted)">' +
                    "<div><span class=\"pill\">visit → click</span> " +
                    escapeHtml(fmtMs(avg(durations.pv_to_dc))) +
                    "</div>" +
                    "<div><span class=\"pill\">click → start</span> " +
                    escapeHtml(fmtMs(avg(durations.dc_to_bs))) +
                    "</div>" +
                    "<div><span class=\"pill\">start → complete</span> " +
                    escapeHtml(fmtMs(avg(durations.bs_to_bc))) +
                    "</div></div></div>" +
                    '<div style="margin-top:0.85rem" class="table-wrap"><table class="data-table"><thead><tr><th>Fastest session</th><th>Time</th><th>Slowest session</th><th>Time</th></tr></thead><tbody><tr><td>' +
                    escapeHtml(fastest ? fastest.sid : "—") +
                    "</td><td>" +
                    escapeHtml(fastest ? fmtMs(fastest.total) : "—") +
                    "</td><td>" +
                    escapeHtml(slowest ? slowest.sid : "—") +
                    "</td><td>" +
                    escapeHtml(slowest ? fmtMs(slowest.total) : "—") +
                    "</td></tr></tbody></table></div>";

              const secMeta = document.createElement("section");
              secMeta.className = "analytics-section";
              secMeta.innerHTML =
                subKpiHtml +
                '<div class="card glass" style="margin-top:1rem"><h3 class="section-title">Time to conversion</h3>' +
                '<p style="margin:-0.35rem 0 0.5rem;font-size:0.82rem;color:var(--text-muted)">Completed strict journeys only</p>' +
                timeInner +
                "</div>" +
                '<div class="analytics-grid-3" style="margin-top:1rem">' +
                '<div class="card glass"><h3 class="section-title">Content slices</h3>' +
                '<div style="margin-top:0.5rem;font-size:0.88rem;line-height:1.65;color:var(--text)">' +
                '<div><span class="pill">Offers pages</span> ' +
                escapeHtml(String(kpiOffersPageViews)) +
                " views</div>" +
                '<div><span class="pill">Services</span> ' +
                escapeHtml(String(kpiServicesPageViews)) +
                " views</div>" +
                '<div><span class="pill">Blog</span> ' +
                escapeHtml(String(kpiBlogPageViews)) +
                " views</div>" +
                '<div style="margin-top:0.5rem;color:var(--text-muted)"><span class="pill">offer_view</span> ' +
                escapeHtml(String(offerViewEvents)) +
                " impressions</div></div></div>" +
                "</div>";
              host.appendChild(secMeta);

              const secAi = document.createElement("section");
              secAi.className = "analytics-section";
              let aiHtml =
                '<header class="analytics-section-head"><h2 class="analytics-section-title">AI-style insights</h2>' +
                '<p class="analytics-section-desc">Rule-based highlights from your live metrics — not an external model.</p></header>' +
                '<div class="card glass analytics-ai-panel">' +
                '<h3 class="section-title" style="margin-top:0">Suggestions</h3>';
              if (!funnelBase && !totalSessions) {
                aiHtml += '<div class="empty-hint">Collect more events to unlock narratives.</div>';
              } else {
                aiHtml +=
                  "<ul>" +
                  (aiBullets.length
                    ? aiBullets.map((x) => "<li>" + x + "</li>").join("")
                    : "<li>No narrative highlights yet — keep tracking.</li>") +
                  "</ul>";
              }
              aiHtml +=
                '<div style="margin-top:1rem"><div class="floating-label">Recommended next actions</div>' +
                (finalRecs.length
                  ? "<ul style=\"margin-top:0.45rem\">" +
                    finalRecs
                      .slice(0, 4)
                      .map((r) => "<li style=\"color:var(--text-muted)\">" + escapeHtml(r) + "</li>")
                      .join("") +
                    "</ul>"
                  : '<p style="margin:0.45rem 0 0;font-size:0.85rem;color:var(--text-muted)">No automated recommendations yet.</p>') +
                "</div></div>";

              if (funnelBase) {
                aiHtml +=
                  '<div style="margin-top:1rem" class="analytics-grid-3">' +
                  (insights.length
                    ? insights
                    : [{ sev: "green", title: "Stable signals", text: "No threshold alerts fired." }]
                  )
                    .map(
                      (it) =>
                        '<div class="item" style="margin:0;padding:1rem;border-radius:var(--radius-sm);border:1px solid var(--glass-border);background:var(--input-bg)">' +
                        '<div style="display:flex;justify-content:space-between;gap:0.5rem;align-items:flex-start;flex-wrap:wrap;margin-bottom:0.45rem">' +
                        "<strong>" +
                        escapeHtml(it.title) +
                        '</strong><span class="pill" style="' +
                        sevStyle(it.sev) +
                        '">' +
                        escapeHtml(it.sev.toUpperCase()) +
                        "</span></div>" +
                        '<div style="font-size:0.88rem;color:var(--text-muted);line-height:1.55">' +
                        escapeHtml(it.text) +
                        "</div></div>"
                    )
                    .join("") +
                  "</div>";
              }
              secAi.innerHTML = aiHtml;
              host.appendChild(secAi);

              const docRows = [...docAll].sort((a, b) => b.clicks + b.bookings - (a.clicks + a.bookings)).slice(0, 12);
              const docLeast = [...docAll].sort((a, b) => a.clicks - b.clicks || a.bookings - b.bookings).slice(0, 5);
              let docTable =
                '<div class="table-wrap"><table class="data-table"><thead><tr><th>Doctor</th><th>Clicks</th><th>Bookings</th><th>Conv.</th></tr></thead><tbody>';
              docRows.forEach((r) => {
                const conv = r.clicks ? ((r.bookings / r.clicks) * 100).toFixed(1) + "%" : "—";
                docTable +=
                  "<tr><td>" +
                  escapeHtml(r.name) +
                  "</td><td>" +
                  escapeHtml(String(r.clicks)) +
                  "</td><td>" +
                  escapeHtml(String(r.bookings)) +
                  "</td><td>" +
                  escapeHtml(conv) +
                  "</td></tr>";
              });
              docTable += "</tbody></table></div>";
              if (docLeast.length && docRows.length) {
                docTable +=
                  '<h4 style="margin:1rem 0 0.5rem;font-size:0.95rem;color:var(--text)">Needs visibility</h4><div class="table-wrap"><table class="data-table"><thead><tr><th>Doctor</th><th>Clicks</th><th>Bookings</th><th>Conv.</th></tr></thead><tbody>';
                docLeast.forEach((r) => {
                  const conv = r.clicks ? ((r.bookings / r.clicks) * 100).toFixed(1) + "%" : "—";
                  docTable +=
                    "<tr><td>" +
                    escapeHtml(r.name) +
                    "</td><td>" +
                    escapeHtml(String(r.clicks)) +
                    "</td><td>" +
                    escapeHtml(String(r.bookings)) +
                    "</td><td>" +
                    escapeHtml(conv) +
                    "</td></tr>";
                });
                docTable += "</tbody></table></div>";
              }

              const svcRows = Array.from(new Set([...Object.keys(serviceClicks), ...Object.keys(bookingsPerService)]))
                .map((name) => ({
                  name,
                  clicks: serviceClicks[name] || 0,
                  bookings: bookingsPerService[name] || 0,
                }))
                .sort((a, b) => b.clicks + b.bookings - (a.clicks + a.bookings))
                .slice(0, 12);
              let svcTable =
                '<div class="table-wrap"><table class="data-table"><thead><tr><th>Service</th><th>Clicks</th><th>Bookings</th><th>Conv.</th></tr></thead><tbody>';
              svcRows.forEach((r) => {
                const conv = r.clicks ? ((r.bookings / r.clicks) * 100).toFixed(1) + "%" : "—";
                svcTable +=
                  "<tr><td>" +
                  escapeHtml(r.name) +
                  "</td><td>" +
                  escapeHtml(String(r.clicks)) +
                  "</td><td>" +
                  escapeHtml(String(r.bookings)) +
                  "</td><td>" +
                  escapeHtml(conv) +
                  "</td></tr>";
              });
              svcTable += "</tbody></table></div>";

              const pageRows = Object.entries(pageCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15);
              let pagesTable =
                '<div class="table-wrap"><table class="data-table"><thead><tr><th>Page</th><th>Views</th></tr></thead><tbody>';
              pageRows.forEach(([p, n]) => {
                pagesTable += "<tr><td>" + escapeHtml(p) + "</td><td>" + escapeHtml(String(n)) + "</td></tr>";
              });
              pagesTable += "</tbody></table></div>";

              const offerRows = Object.entries(offerViews).sort((a, b) => b[1] - a[1]);
              let offersTable =
                '<div class="table-wrap"><table class="data-table"><thead><tr><th>Offer ID</th><th>Views</th><th>Share</th></tr></thead><tbody>';
              offerRows.slice(0, 20).forEach(([id, n]) => {
                const share = offerViewEvents ? ((n / offerViewEvents) * 100).toFixed(1) + "%" : "—";
                offersTable += "<tr><td>" + escapeHtml(id) + "</td><td>" + escapeHtml(String(n)) + "</td><td>" + escapeHtml(share) + "</td></tr>";
              });
              offersTable += "</tbody></table></div>";

              const secTables = document.createElement("section");
              secTables.className = "analytics-section";
              secTables.innerHTML =
                '<header class="analytics-section-head"><h2 class="analytics-section-title">Breakdowns</h2>' +
                '<p class="analytics-section-desc">Doctors, services, pages, and offers ranked by engagement.</p></header>' +
                '<div class="analytics-tables-grid">' +
                '<div class="card glass"><h3 class="section-title">Top doctors</h3>' +
                (docRows.length ? docTable : '<div class="empty-hint">No doctor interactions yet.</div>') +
                "</div>" +
                '<div class="card glass"><h3 class="section-title">Popular services</h3>' +
                (svcRows.length ? svcTable : '<div class="empty-hint">No service interactions yet.</div>') +
                "</div>" +
                '<div class="card glass"><h3 class="section-title">Most visited pages</h3>' +
                (pageRows.length ? pagesTable : '<div class="empty-hint">No page views tracked yet.</div>') +
                "</div>" +
                '<div class="card glass"><h3 class="section-title">Offer performance</h3>' +
                (offerRows.length
                  ? offersTable
                  : '<div class="empty-hint">No offer_view events yet.</div>') +
                "</div></div>";
              host.appendChild(secTables);
            })
            .catch((e) => {
              host.className = "";
              host.innerHTML = '<div class="card glass"><div class="empty-hint">' + escapeHtml(e.message || "Failed to load events") + "</div></div>";
            });
        }


        const routes = {
          overview: renderOverview,
          stats: renderStats,
          homepage: renderHomepageTab,
          branches: renderBranchesTab,
          services: renderServicesTab,
          doctors: renderDoctorsTab,
          schedule: renderSchedule,
          offers: renderOffersTab,
          careers: renderCareersTab,
          insurance: renderInsuranceTab,
          bookings: renderBookings,
          blog: renderBlog,
          analytics: renderAnalytics,
        };

        function navigate(id) {
          if (window.__psAnalyticsRefresh) {
            clearInterval(window.__psAnalyticsRefresh);
            window.__psAnalyticsRefresh = null;
          }
          activeRoute = id;
          renderSidebar();
          const main = $("mainContent");
          main.innerHTML = "";
          const fn = routes[id];
          if (fn && state) fn(main);
          closeSidebarMobile();
          track("page_visit", { service: id });
        }

        function closeSidebarMobile() {
          $("sidebar").classList.remove("open");
          $("sidebarBackdrop").classList.remove("show");
        }

        $("menuToggle").addEventListener("click", () => {
          $("sidebar").classList.toggle("open");
          $("sidebarBackdrop").classList.toggle("show");
        });
        $("sidebarBackdrop").addEventListener("click", closeSidebarMobile);

        function showDash() {
          $("loginScreen").classList.add("hidden");
          $("appDash").classList.remove("hidden");
          renderSidebar();
          navigate(activeRoute);
          markSaved();
          startBookingsPolling();
          track("page_visit", { service: "dashboard" });
        }

        function showLogin() {
          stopBookingsPolling();
          $("appDash").classList.add("hidden");
          $("loginScreen").classList.remove("hidden");
          closeSidebarMobile();
        }

        $("btnLogin").addEventListener("click", async () => {
          $("loginErr").textContent = "";
          try {
            token = await apiLogin($("u").value.trim(), $("p").value);
            sessionStorage.setItem(TOKEN_KEY, token);
            state = await apiGet();
            flattenHomeAboutForAdmin(state);
            // Ensure footer branches exist so they can be edited/saved immediately.
            if (!state.footerBranches || typeof state.footerBranches !== "object") state.footerBranches = {};
            if (!state.footerBranches.main || typeof state.footerBranches.main !== "object") {
              state.footerBranches.main = {
                name: { ar: "فرع الخالدية", en: "Khalidiyah Branch" },
                address: { ar: "", en: "" },
                phone: "",
                hours: { ar: "", en: "" },
                map_embed_url: "",
              };
            }
            if (!state.footerBranches.khalidiya || typeof state.footerBranches.khalidiya !== "object") {
              state.footerBranches.khalidiya = {
                name: { ar: "فرع مدينة خليفة أ", en: "Khalifa City A Branch" },
                address: { ar: "", en: "" },
                phone: "",
                hours: { ar: "", en: "" },
                map_embed_url: "",
              };
            }
            await refreshBookings();
            showDash();
            showToast("Welcome back", true);
          } catch (e) {
            $("loginErr").textContent = e.message || "Login failed";
          }
        });

        $("btnLogout").addEventListener("click", () => {
          token = null;
          sessionStorage.removeItem(TOKEN_KEY);
          state = null;
          showLogin();
        });

        $("btnReload").addEventListener("click", async () => {
          try {
            state = await apiGet();
            flattenHomeAboutForAdmin(state);
            if (!state.footerBranches || typeof state.footerBranches !== "object") state.footerBranches = {};
            await refreshBookings();
            navigate(activeRoute);
            markSaved();
            showToast("Reloaded from server", true);
          } catch (e) {
            saveState = "error";
            updateSaveStatus();
            showToast(e.message, false);
          }
        });

        $("btnSave").addEventListener("click", async () => {
          saveState = "saving";
          updateSaveStatus();
          try {
            await apiSave(prepareStateForSave(state));
            saveState = "saved";
            markSaved();
            showToast("Saved · refresh the public site to publish", true);
          } catch (e) {
            saveState = "error";
            updateSaveStatus();
            showToast(e.message, false);
          }
        });

        async function bootstrap() {
          if (token) {
            try {
              state = await apiGet();
              flattenHomeAboutForAdmin(state);
              await refreshBookings();
              showDash();
              return;
            } catch (e) {
              token = null;
              sessionStorage.removeItem(TOKEN_KEY);
            }
          }
          showLogin();
        }

        bootstrap();
      })();
    </script>
  </body>
</html>
