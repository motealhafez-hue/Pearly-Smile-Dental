        async function uploadImageFile(file) {
          const fd = new FormData();
          fd.append("file", file);
          const r = await fetch(apiBase + "/api/upload", {
            method: "POST",
            headers: token ? { Authorization: "Bearer " + token } : {},
            body: fd,
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            let msg = "Upload failed";
            try {
              const j = await r.json();
              if (j && j.detail) msg = String(j.detail);
            } catch (e) {}
            throw new Error(msg);
          }
          const j = await r.json();
          if (!j || !j.url) throw new Error("Upload failed: missing url");
          // Return absolute URL for convenience
          return j.url.startsWith("http") ? j.url : apiBase + j.url;
        }

        /**
         * Drag or sliders to set object-position / background-position (focal). Updates row[xKey]/row[yKey] (0–100).
         */
        function mountImageFocalStudio(row, getImageUrl, xKey, yKey, scaleKey) {
          const wrap = document.createElement("div");
          wrap.className = "hero-focal-studio";

          const title = document.createElement("div");
          title.className = "hero-focal-studio__title";
          title.textContent = "Focal point · موضع الصورة";
          wrap.appendChild(title);

          const hint = document.createElement("p");
          hint.className = "hero-focal-studio__hint";
          hint.textContent =
            "اسحب داخل الإطار أو استخدم المنزلقات لتحريك بؤرة الصورة (يمين/يسار، أعلى/أسفل) وتكبير/تصغير الصورة. تُحفظ مع الصورة وتظهر في الموقع.";
          wrap.appendChild(hint);

          const frame = document.createElement("div");
          frame.className = "hero-focal-studio__frame";
          const prevImg = document.createElement("img");
          prevImg.alt = "";
          const dot = document.createElement("span");
          dot.className = "hero-focal-studio__dot";
          frame.appendChild(prevImg);
          frame.appendChild(dot);
          wrap.appendChild(frame);

          const readout = document.createElement("div");
          readout.className = "hero-focal-studio__readout";
          wrap.appendChild(readout);

          const sliders = document.createElement("div");
          sliders.className = "hero-focal-studio__sliders";
          const labX = document.createElement("label");
          labX.textContent = "Horizontal · أفقي";
          const rngX = document.createElement("input");
          rngX.type = "range";
          rngX.min = "0";
          rngX.max = "100";
          rngX.step = "0.5";
          labX.appendChild(rngX);
          const labY = document.createElement("label");
          labY.textContent = "Vertical · عمودي";
          const rngY = document.createElement("input");
          rngY.type = "range";
          rngY.min = "0";
          rngY.max = "100";
          rngY.step = "0.5";
          labY.appendChild(rngY);
          sliders.appendChild(labX);
          sliders.appendChild(labY);
          const labS = document.createElement("label");
          labS.textContent = "Zoom · تكبير";
          const rngS = document.createElement("input");
          rngS.type = "range";
          rngS.min = "80";
          rngS.max = "160";
          rngS.step = "1";
          labS.appendChild(rngS);
          sliders.appendChild(labS);
          wrap.appendChild(sliders);

          const actions = document.createElement("div");
          actions.className = "hero-focal-studio__actions";
          const btnCenter = document.createElement("button");
          btnCenter.type = "button";
          btnCenter.className = "btn btn-ghost";
          btnCenter.textContent = "توسيط · Center";
          actions.appendChild(btnCenter);
          wrap.appendChild(actions);

          function focalXY() {
            let x = Number(row[xKey]);
            let y = Number(row[yKey]);
            if (!Number.isFinite(x)) x = 50;
            if (!Number.isFinite(y)) y = 50;
            return {
              x: Math.min(100, Math.max(0, x)),
              y: Math.min(100, Math.max(0, y)),
            };
          }

          function scaleVal() {
            if (!scaleKey) return 1;
            let s = Number(row[scaleKey]);
            if (!Number.isFinite(s)) s = 1;
            s = Math.min(3, Math.max(0.5, s));
            return s;
          }

          function snap(v) {
            return Math.round(Number(v) * 20) / 20;
          }

          function paintFocalVisual(f) {
            const s = scaleVal();
            prevImg.style.objectPosition = f.x + "% " + f.y + "%";
            prevImg.style.transformOrigin = f.x + "% " + f.y + "%";
            prevImg.style.transform = "scale(" + s + ")";
            dot.style.left = f.x + "%";
            dot.style.top = f.y + "%";
            rngX.value = String(f.x);
            rngY.value = String(f.y);
            rngS.value = String(Math.round(s * 100));
            readout.textContent = f.x + "% · " + f.y + "% · " + Math.round(s * 100) + "%";
          }

          function setFocal(x, y) {
            row[xKey] = snap(x);
            row[yKey] = snap(y);
            paintFocalVisual(focalXY());
            try {
              markDirty();
            } catch (eMd) {
              /* no-op */
            }
          }

          function setScale(pct) {
            if (!scaleKey) return;
            let p = Number(pct);
            if (!Number.isFinite(p)) p = 100;
            p = Math.min(300, Math.max(50, p));
            row[scaleKey] = Math.round((p / 100) * 100) / 100;
            paintFocalVisual(focalXY());
            try {
              markDirty();
            } catch (eMd) {
              /* no-op */
            }
          }

          function refreshImage() {
            const u = (getImageUrl && getImageUrl()) ? String(getImageUrl()).trim() : "";
            if (u) {
              prevImg.src = u;
              frame.classList.remove("is-disabled");
              rngX.disabled = false;
              rngY.disabled = false;
              rngS.disabled = false;
              btnCenter.disabled = false;
            } else {
              prevImg.removeAttribute("src");
              frame.classList.add("is-disabled");
              rngX.disabled = true;
              rngY.disabled = true;
              rngS.disabled = true;
              btnCenter.disabled = true;
            }
            paintFocalVisual(focalXY());
          }

          rngX.addEventListener("input", function () {
            setFocal(Number(rngX.value), focalXY().y);
          });
          rngY.addEventListener("input", function () {
            setFocal(focalXY().x, Number(rngY.value));
          });
          rngS.addEventListener("input", function () {
            setScale(Number(rngS.value));
          });
          btnCenter.addEventListener("click", function () {
            setFocal(50, 50);
            setScale(100);
          });

          let dragPid = null;
          function pointerToFocal(ev) {
            const rect = frame.getBoundingClientRect();
            if (!rect.width || !rect.height) return;
            const x = ((ev.clientX - rect.left) / rect.width) * 100;
            const y = ((ev.clientY - rect.top) / rect.height) * 100;
            setFocal(x, y);
          }
          frame.addEventListener("pointerdown", function (e) {
            if (frame.classList.contains("is-disabled")) return;
            e.preventDefault();
            frame.setPointerCapture(e.pointerId);
            dragPid = e.pointerId;
            pointerToFocal(e);
          });
          frame.addEventListener("pointermove", function (e) {
            if (dragPid == null || e.pointerId !== dragPid) return;
            pointerToFocal(e);
          });
          function endDrag(e) {
            if (dragPid != null && e.pointerId === dragPid) {
              dragPid = null;
              try {
                frame.releasePointerCapture(e.pointerId);
              } catch (eR) {
                /* no-op */
              }
            }
          }
          frame.addEventListener("pointerup", endDrag);
          frame.addEventListener("pointercancel", endDrag);

          refreshImage();
          wrap.refreshFocal = refreshImage;
          wrap.refreshHeroFocal = refreshImage;
          return wrap;
        }

        function mountHeroFocalStudio(row, getHeroUrl) {
          return mountImageFocalStudio(row, getHeroUrl, "hero_focal_x", "hero_focal_y", "hero_scale");
        }

        function createImageUploader(opts) {
          const get = opts.get;
          const set = opts.set;
          const label = opts.label || "Image";
          const emptySize = opts.size || { w: 72, h: 72 };
          const maxPreview = opts.maxPreview || { w: 280, h: 210 };

          function notifyFocalRefresh() {
            if (opts.focal && typeof opts.focal.refresh === "function") {
              try {
                opts.focal.refresh();
              } catch (e) {
                /* no-op */
              }
            }
          }

          const wrap = document.createElement("div");
          const lab = document.createElement("span");
          lab.className = "floating-label";
          lab.textContent = label;
          wrap.appendChild(lab);

          const row = document.createElement("div");
          row.className = "uploader";

          function resetPreviewBoxEmpty() {
            row.style.setProperty("--uploader-w", String(emptySize.w) + "px");
            row.style.setProperty("--uploader-h", String(emptySize.h) + "px");
          }

          function applyPreviewBoxFromNatural(nw, nh) {
            if (!nw || !nh) {
              resetPreviewBoxEmpty();
              return;
            }
            const scale = Math.min(1, maxPreview.w / nw, maxPreview.h / nh);
            const w = Math.max(48, Math.round(nw * scale));
            const h = Math.max(48, Math.round(nh * scale));
            row.style.setProperty("--uploader-w", w + "px");
            row.style.setProperty("--uploader-h", h + "px");
          }

          resetPreviewBoxEmpty();

          const preview = document.createElement("div");
          preview.className = "uploader-preview";

          const status = document.createElement("span");
          status.className = "pill uploader-status";
          preview.appendChild(status);

          const drop = document.createElement("div");
          drop.className = "uploader-drop";
          drop.innerHTML =
            '<div style="min-width:0"><div class="title">Drag & drop</div><div class="sub">or use the button</div></div>';

          const inp = document.createElement("input");
          inp.type = "file";
          inp.accept = "image/*";
          inp.style.display = "none";

          const btnUp = document.createElement("button");
          btnUp.type = "button";
          btnUp.className = "btn btn-ghost";

          const btnClear = document.createElement("button");
          btnClear.type = "button";
          btnClear.className = "btn btn-ghost";
          btnClear.textContent = "Remove";

          let localPreviewUrl = "";
          let busy = false;

          function paintPreview() {
            const url = get() ? String(get()) : "";
            const showUrl = localPreviewUrl || url;
            preview.querySelectorAll("img").forEach((n) => n.remove());
            const oldTxt = preview.querySelector(".uploader-empty");
            if (oldTxt) oldTxt.remove();

            if (showUrl) {
              const img = document.createElement("img");
              img.alt = "";
              img.decoding = "async";
              img.addEventListener("load", function () {
                applyPreviewBoxFromNatural(img.naturalWidth, img.naturalHeight);
              });
              img.addEventListener("error", function () {
                resetPreviewBoxEmpty();
              });
              img.src = showUrl;
              preview.insertBefore(img, status);
              btnUp.textContent = "Change image";
            } else {
              resetPreviewBoxEmpty();
              const t = document.createElement("div");
              t.className = "uploader-empty";
              t.textContent = "No image";
              preview.insertBefore(t, status);
              btnUp.textContent = "Upload image";
            }
            notifyFocalRefresh();
          }

          function setStatus(kind, text) {
            status.style.display = "inline-block";
            status.textContent = text;
            if (kind === "warn") {
              status.style.background = "rgba(251, 191, 36, 0.15)";
              status.style.color = "var(--warning)";
            } else if (kind === "ok") {
              status.style.background = "rgba(74, 222, 128, 0.14)";
              status.style.color = "var(--success)";
            } else if (kind === "err") {
              status.style.background = "rgba(248, 113, 113, 0.14)";
              status.style.color = "var(--danger)";
            } else {
              status.style.background = "var(--accent-dim)";
              status.style.color = "var(--accent)";
            }
          }

          async function handleFile(file) {
            if (!file) return;
            if (busy) return;
            busy = true;
            btnUp.disabled = true;
            btnClear.disabled = true;
            setStatus("warn", "Uploading…");

            if (localPreviewUrl) {
              try {
                URL.revokeObjectURL(localPreviewUrl);
              } catch (e) {}
              localPreviewUrl = "";
            }
            try {
              localPreviewUrl = URL.createObjectURL(file);
            } catch (e) {
              localPreviewUrl = "";
            }
            paintPreview();

            try {
              const url = await uploadImageFile(file);
              set(url);
              if (localPreviewUrl) {
                try {
                  URL.revokeObjectURL(localPreviewUrl);
                } catch (e) {}
                localPreviewUrl = "";
              }
              paintPreview();
              markDirty();
              showToast("Image uploaded", true);
              setStatus("ok", "Saved");
              setTimeout(() => (status.style.display = "none"), 1400);
            } catch (e) {
              showToast(e.message || "Upload failed", false);
              setStatus("err", "Failed");
            }

            busy = false;
            btnUp.disabled = false;
            btnClear.disabled = false;
          }

          btnUp.addEventListener("click", () => inp.click());
          inp.addEventListener("change", () => {
            const file = inp.files && inp.files[0];
            inp.value = "";
            handleFile(file);
          });

          btnClear.addEventListener("click", () => {
            set("");
            if (localPreviewUrl) {
              try {
                URL.revokeObjectURL(localPreviewUrl);
              } catch (e) {}
              localPreviewUrl = "";
            }
            paintPreview();
            markDirty();
          });

          drop.addEventListener("dragover", (e) => {
            e.preventDefault();
            drop.classList.add("is-dragover");
          });
          drop.addEventListener("dragleave", () => {
            drop.classList.remove("is-dragover");
          });
          drop.addEventListener("drop", (e) => {
            e.preventDefault();
            drop.classList.remove("is-dragover");
            const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
            handleFile(file);
          });

          paintPreview();

          row.appendChild(preview);
          row.appendChild(drop);
          row.appendChild(btnUp);
          row.appendChild(btnClear);
          wrap.appendChild(row);
          wrap.appendChild(inp);
          return wrap;
        }

        function textLang(labelAr, labelEn, obj, onChange) {
          const wrap = document.createElement("div");
          wrap.className = "row-2";
          const a = document.createElement("div");
          const b = document.createElement("div");
          let lastEdit = "ar";
          const la = document.createElement("span");
          la.className = "floating-label";
          la.textContent = labelAr;
          const ta = document.createElement("textarea");
          ta.className = "field";
          ta.value = (obj && obj.ar) || "";
          ta.addEventListener("input", () => {
            lastEdit = "ar";
            onChange("ar", ta.value);
            markDirty();
          });
          const lb = document.createElement("span");
          lb.className = "floating-label";
          lb.textContent = labelEn;
          const tb = document.createElement("textarea");
          tb.className = "field";
          tb.value = (obj && obj.en) || "";
          tb.addEventListener("input", () => {
            lastEdit = "en";
            onChange("en", tb.value);
            markDirty();
          });
          a.appendChild(la);
          a.appendChild(ta);
          b.appendChild(lb);
          b.appendChild(tb);
          wrap.appendChild(a);
          wrap.appendChild(b);

          const tools = document.createElement("div");
          tools.className = "lang-tools";
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "btn-auto-translate";
          btn.textContent = "Auto translate";
          btn.addEventListener("click", async () => {
            const ar = String(ta.value || "").trim();
            const en = String(tb.value || "").trim();
            const srcLang = lastEdit === "en" ? "en" : "ar";
            const srcText = srcLang === "en" ? en : ar;
            const targetLang = srcLang === "en" ? "ar" : "en";
            if (!srcText) return;
            btn.disabled = true;
            const oldTxt = btn.textContent;
            btn.textContent = "Translating…";
            try {
              const res = await apiTranslate(srcText, srcLang, targetLang);
              const outAr = res && typeof res === "object" ? String(res.ar || "") : "";
              const outEn = res && typeof res === "object" ? String(res.en || "") : "";
              if (targetLang === "ar" && outAr) {
                tb.value = en; // keep source as-is
                ta.value = outAr;
                onChange("ar", ta.value);
              } else if (targetLang === "en" && outEn) {
                ta.value = ar;
                tb.value = outEn;
                onChange("en", tb.value);
              }
              markDirty();
            } catch (e) {
              alert(e && e.message ? e.message : "Translate failed");
            } finally {
              btn.disabled = false;
              btn.textContent = oldTxt;
            }
          });
          tools.appendChild(btn);
          // put tools under EN field so layout stays clean
          b.appendChild(tools);
          return wrap;
        }

        function listEditor(parent, key, title, fields) {
          const card = document.createElement("div");
          card.className = "card glass";
          if (title) {
            const h = document.createElement("h3");
            h.className = "section-title";
            h.textContent = title;
            card.appendChild(h);
          }

          const toolbar = document.createElement("div");
          toolbar.className = "toolbar-inline";
          const search = document.createElement("input");
          search.type = "search";
          search.className = "search-input";
          search.placeholder = "Search…";
          search.setAttribute("aria-label", "Search list");
          toolbar.appendChild(search);

          const addBtn = document.createElement("button");
          addBtn.type = "button";
          addBtn.className = "btn btn-primary";
          addBtn.textContent = "+ Add";
          addBtn.addEventListener("click", () => {
            const id = "new-" + Date.now();
            const row = { id };
            fields.forEach((f) => {
              if (f.type === "lang") row[f.key] = { ar: "", en: "" };
              else if (f.type === "branches") row[f.key] = ["main", "khalidiya"];
              else row[f.key] = f.default != null ? f.default : "";
            });
            state[key].push(row);
            markDirty();
            navigate(activeRoute);
          });
          toolbar.appendChild(addBtn);
          card.appendChild(toolbar);

          const listHost = document.createElement("div");
          listHost.className = "list-host";

          function itemMatches(item, q) {
            if (!q) return true;
            const hay = JSON.stringify(item).toLowerCase();
            return hay.includes(q);
          }

          function paint() {
            listHost.innerHTML = "";
            const q = (search.value || "").trim().toLowerCase();
            state[key].forEach((item) => {
              if (!itemMatches(item, q)) return;

              const it = document.createElement("div");
              it.className = "item";
              const head = document.createElement("div");
              head.className = "item-head";
              const strong = document.createElement("strong");
              strong.textContent = item.title
                ? item.title.en || item.title.ar || item.id
                : item.name
                  ? item.name.en || item.name.ar || item.id
                  : item.id;
              const del = document.createElement("button");
              del.type = "button";
              del.className = "btn btn-danger";
              del.textContent = "Delete";
              del.addEventListener("click", () => {
                if (!confirm("Delete this row?")) return;
                const i = state[key].indexOf(item);
                if (i !== -1) state[key].splice(i, 1);
                markDirty();
                navigate(activeRoute);
              });
              head.appendChild(strong);
              head.appendChild(del);
              it.appendChild(head);

              fields.forEach((f) => {
                if (f.type === "lang") {
                  if (!item[f.key]) item[f.key] = { ar: "", en: "" };
                  it.appendChild(
                    textLang(f.labelAr, f.labelEn, item[f.key], (lang, val) => {
                      item[f.key][lang] = val;
                      strong.textContent = item.title
                        ? item.title.en || item.title.ar || item.id
                        : item.name
                          ? item.name.en || item.name.ar || item.id
                          : item.id;
                    })
                  );
                } else if (f.type === "text") {
                  it.appendChild(
                    field(
                      f.label,
                      f.key === "accepted_services" && Array.isArray(item[f.key]) ? item[f.key].join(", ") : item[f.key],
                      (v) => {
                      if (f.key === "accepted_services") {
                        item[f.key] = String(v || "")
                          .split(",")
                          .map((s) => s.trim())
                          .filter(Boolean);
                      } else {
                        item[f.key] = v;
                      }
                      }
                    )
                  );
                } else if (f.type === "image") {
                  const focalRef = { refresh: null };
                  it.appendChild(
                    createImageUploader({
                      label: f.label || "Image",
                      size: { w: 72, h: 72 },
                      maxPreview: { w: 128, h: 128 },
                      get: () => item[f.key],
                      set: (v) => {
                        item[f.key] = v;
                      },
                      focal: {
                        refresh: () => {
                          if (typeof focalRef.refresh === "function") focalRef.refresh();
                        },
                      },
                    })
                  );
                  const fw = mountImageFocalStudio(
                    item,
                    () => item[f.key],
                    f.key + "_focal_x",
                    f.key + "_focal_y",
                    f.key + "_scale"
                  );
                  focalRef.refresh = () => fw.refreshFocal();
                  it.appendChild(fw);
                } else if (f.type === "branches") {
                  if (!Array.isArray(item[f.key])) item[f.key] = ["main", "khalidiya"];
                  const brCard = document.createElement("div");
                  brCard.className = "help-text";
                  brCard.style.marginTop = "8px";
                  brCard.innerHTML =
                    "<strong>Booking · branches</strong><br />Uncheck a location if this doctor does not see patients there.";
                  const rowCh = document.createElement("div");
                  rowCh.className = "sched-inline";
                  rowCh.style.marginTop = "8px";
                  [
                    { id: "main", lab: "Khalidiyah Branch" },
                    { id: "khalidiya", lab: "Khalifa City A Branch" },
                  ].forEach(function (bo) {
                    const lab = document.createElement("label");
                    lab.className = "sched-chip";
                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.checked = item[f.key].indexOf(bo.id) !== -1;
                    cb.addEventListener("change", function () {
                      const set = new Set(item[f.key]);
                      if (cb.checked) set.add(bo.id);
                      else set.delete(bo.id);
                      item[f.key] = Array.from(set);
                      markDirty();
                    });
                    lab.appendChild(cb);
                    lab.appendChild(document.createTextNode(" " + bo.lab));
                    rowCh.appendChild(lab);
                  });
                  brCard.appendChild(rowCh);
                  it.appendChild(brCard);
                }
              });
              listHost.appendChild(it);
            });
          }

          search.addEventListener("input", paint);
          paint();
          card.appendChild(listHost);
          parent.appendChild(card);
        }

        function renderSchedule(root) {
          setPageHead(
            "Schedule",
            "Per-branch hours, closed days with reasons, and doctor availability. Changes apply only to the selected branch."
          );
          root.innerHTML = '<div class="card glass"><p class="empty-hint">Loading schedule…</p></div>';
          (async () => {
            let sch;
            try {
              sch = await apiGetSchedule();
            } catch (e) {
              root.innerHTML =
                '<div class="card glass"><p class="empty-hint">' + escapeHtml(e.message || "Load failed") + "</p></div>";
              return;
            }
            if (!sch || !sch.branches) {
              root.innerHTML =
                '<div class="card glass"><p class="empty-hint">Schedule file must be v2 with branches. Restart the API to migrate, or restore schedule.json.</p></div>';
              return;
            }
            const fullSch = JSON.parse(JSON.stringify(sch));
            let activeBranchId = "main";
            let calMonthOffset = 0;

            function bsched() {
              return fullSch.branches[activeBranchId];
            }

            function defaultClosedDay(dateStr) {
              return {
                date: dateStr,
                reason_type: "holiday",
                message_en: "",
                message_ar: "",
                show_message: true,
                custom_detail: "",
              };
            }

            function commitActiveFromDom() {
              const b = fullSch.branches[activeBranchId];
              if (!b) return;
              const gp = wrap.querySelector("#schedGlobalPause");
              fullSch.global_paused = !!(gp && gp.checked);
              const panel = wrap.querySelector("#schedBranchPanelHost");
              if (!panel) return;
              const slotsTa = panel.querySelector("#schedSlotsTa");
              b.time_slots = (slotsTa && slotsTa.value ? slotsTa.value : "")
                .split(/\r?\n/)
                .map(function (s) {
                  return s.trim();
                })
                .filter(Boolean);
              b.weekly_open_weekdays = Array.from(panel.querySelectorAll("input.sched-weekly:checked")).map(function (el) {
                return Number(el.getAttribute("data-wd"));
              });
              const drows = [];
              panel.querySelectorAll(".sched-doc-card").forEach(function (card) {
                const did = card.dataset.docId;
                const acc = card.querySelector(".sched-acc");
                const bd = card
                  .querySelector(".sched-bd")
                  .value.split(/\r?\n/)
                  .map(function (s) {
                    return s.trim();
                  })
                  .filter(Boolean);
                const rs = card.querySelector(".sched-br-s").value;
                const re = card.querySelector(".sched-br-e").value;
                const ranges = [];
                if (rs && re) ranges.push({ start: rs, end: re });
                const awd = Array.from(card.querySelectorAll("input.sched-awd:checked")).map(function (el) {
                  return Number(el.getAttribute("data-wd"));
                });
                const sel = card.querySelector(".sched-slots");
                const allowed = Array.from(sel.selectedOptions).map(function (o) {
                  return o.value;
                });
                drows.push({
                  doctor_id: did,
                  accepts_bookings: !!(acc && acc.checked),
                  blocked_dates: bd,
                  blocked_ranges: ranges,
                  allowed_weekdays: awd.length ? awd : null,
                  allowed_slots: allowed.length ? allowed : null,
                });
              });
              b.doctors = drows;
            }

            function doctorRow(doc, b) {
              const did = String(doc.id || "").trim();
              if (!did) return null;
              const cur =
                (b.doctors || []).find(function (x) {
                  return x && String(x.doctor_id) === did;
                }) || {
                  doctor_id: did,
                  accepts_bookings: true,
                  allowed_slots: null,
                  allowed_weekdays: null,
                  blocked_dates: [],
                  blocked_ranges: [],
                };
              const row = document.createElement("div");
              row.className = "card glass sched-doc-card";
              row.dataset.docId = did;
              const nm = escapeHtml((doc.name && (doc.name.en || doc.name.ar)) || did);

              const accepts = cur.accepts_bookings !== false;
              const blockedCount = Array.isArray(cur.blocked_dates) ? cur.blocked_dates.length : 0;
              const slotsTxt =
                Array.isArray(cur.allowed_slots) && cur.allowed_slots.length
                  ? cur.allowed_slots.length + " slots"

              const summary = document.createElement("button");
              summary.type = "button";
              summary.className = "sched-doc-summary";

                '<span class="sched-doc-summary__meta">' +

                ' /><span>Accepts online bookings</span></label>' +
                '<p class="help-text" style="margin:0.25rem 0 0.4rem">Blocked dates (one YYYY-MM-DD per line)</p>' +
                '<textarea class="field sched-bd" rows="2" placeholder="2026-12-25">' +

                '<p class="help-text" style="margin:0.75rem 0 0.35rem">Blocked range (optional)</p>' +
                '<div class="row-2"><input type="date" class="field sched-br-s" value="' +
                escapeHtml((cur.blocked_ranges && cur.blocked_ranges[0] && cur.blocked_ranges[0].start) || "") +
                '" /><input type="date" class="field sched-br-e" value="' +
                escapeHtml((cur.blocked_ranges && cur.blocked_ranges[0] && cur.blocked_ranges[0].end) || "") +
                '" /></div>' +
                '<p class="help-text" style="margin:0.75rem 0 0.35rem">Allowed weekdays (empty = follow clinic week)</p>' +
                '<div class="sched-wd-mini">' +
                SCHED_WD.map(function (w) {
                  const aw = cur.allowed_weekdays;
                  const on =
                    Array.isArray(aw) && aw.length ? aw.map(Number).indexOf(w.v) !== -1 : false;
                  return (
                    '<label class="sched-chip"><input type="checkbox" class="sched-awd" data-wd="' +
                    w.v +
                    '" ' +
                    (on ? "checked" : "") +
                    " />" +
                    escapeHtml(w.lab) +

                '<select class="field sched-slots" multiple size="6"></select>';

              row.appendChild(summary);
              row.appendChild(body);

              const ms = body.querySelector(".sched-slots");
              (b.time_slots || []).forEach(function (t) {
                const o = document.createElement("option");
                o.value = t;
                o.textContent = t;
                if (Array.isArray(cur.allowed_slots) && cur.allowed_slots.length && cur.allowed_slots.indexOf(t) !== -1) {

                  }

              }

              card1.className = "card glass sched-section sched-section--hours";
              card1.innerHTML =

                '<span class="sched-branch-tag sched-branch-tag--' +

                '">' +
                (activeBranchId === "main" ? "Khalidiyah Branch" : "Khalifa City A Branch") +

              const card2 = document.createElement("div");
              card2.className = "card glass sched-section sched-section--off";
              card2.innerHTML =

            function renderCal() {
              const b = bsched();
              const calHostEl = wrap.querySelector("#schedCalHost");
              const titleEl = wrap.querySelector("#schedCalTitle");
              if (!calHostEl) return;
              const now = new Date();
              const y = now.getFullYear();
              const m = now.getMonth() + calMonthOffset;
              const first = new Date(y, m, 1);
              const startPad = (first.getDay() + 6) % 7;
              const daysInMonth = new Date(y, m + 1, 0).getDate();
              const closedSet = new Set(
                (b.closed_days || [])
                  .map(function (x) {
                    return x && x.date ? String(x.date) : "";
                  })
                  .filter(Boolean)
              );
              if (titleEl) {
                titleEl.textContent = first.toLocaleString(undefined, { month: "long", year: "numeric" });
              }
              let html =
                '<div class="sched-cal-grid"><span class="sched-cal-h">Mo</span><span class="sched-cal-h">Tu</span><span class="sched-cal-h">We</span><span class="sched-cal-h">Th</span><span class="sched-cal-h">Fr</span><span class="sched-cal-h">Sa</span><span class="sched-cal-h">Su</span>';
              for (let i = 0; i < startPad; i++) html += '<span class="sched-cal-cell sched-cal-empty"></span>';
              const todayStr =
                now.getFullYear() +
                "-" +
                String(now.getMonth() + 1).padStart(2, "0") +
                "-" +
                String(now.getDate()).padStart(2, "0");
              for (let d = 1; d <= daysInMonth; d++) {
                const ds =
                  first.getFullYear() +
                  "-" +
                  String(first.getMonth() + 1).padStart(2, "0") +
                  "-" +
                  String(d).padStart(2, "0");
                const isCl = closedSet.has(ds);
                const isTo = ds === todayStr;
                html +=
                  '<button type="button" class="sched-cal-cell sched-cal-day' +
                  (isCl ? " is-closed" : "") +
                  (isTo ? " is-today" : "") +
                  '" data-date="' +
                  escapeHtml(ds) +
                  '">' +
                  d +
                  "</button>";
              }
              html += "</div>";
              calHostEl.innerHTML = html;
              calHostEl.querySelectorAll("button.sched-cal-day").forEach(function (btn) {
                btn.addEventListener("click", function () {
                  const ds = btn.getAttribute("data-date");
                  if (!ds) return;
                  const ix = (b.closed_days || []).findIndex(function (x) {
                    return x && x.date === ds;
                  });
                  if (ix >= 0) {
                    b.closed_days.splice(ix, 1);
                  } else {
                    b.closed_days.push(defaultClosedDay(ds));
                  }
                  paintClosedDaysEditor();
                  renderCal();
                });
              });
            }

            root.innerHTML = "";
            const wrap = document.createElement("div");
            wrap.className = "schedule-admin schedule-admin-v2 sched-admin-stack";

            const intro = document.createElement("p");
            intro.className = "help-text";
            intro.style.marginBottom = "0.75rem";
            intro.textContent =
              "Select a branch first. Saving writes all branches; the booking site filters by the visitor’s branch.";
            wrap.appendChild(intro);

            const pills = document.createElement("div");
            pills.className = "sched-branch-pills";
            ["main", "khalidiya"].forEach(function (bid) {
              const pill = document.createElement("button");
              pill.type = "button";
              pill.className =
                "btn sched-branch-pill sched-branch-pill--" + bid + (bid === activeBranchId ? " is-active" : "");
              pill.setAttribute("data-branch", bid);
              pill.textContent = bid === "main" ? "Khalidiyah Branch" : "Khalifa City A Branch";
              pill.addEventListener("click", function () {

                commitActiveFromDom();
                activeBranchId = bid;
                pills.querySelectorAll(".sched-branch-pill").forEach(function (p) {
                  p.classList.toggle("is-active", p.getAttribute("data-branch") === activeBranchId);

                renderBranchPanel();

              '<input type="checkbox" id="schedGlobalPause" ' +
              (fullSch.global_paused ? "checked" : "") +
              " />" +
              '<span>Pause all online bookings (all branches)</span></label>';
            wrap.appendChild(g);

            const branchHost = document.createElement("div");
            branchHost.id = "schedBranchPanelHost";
            wrap.appendChild(branchHost);

            root.appendChild(wrap);
            renderBranchPanel();

            const saveBar = document.createElement("div");
            saveBar.className = "toolbar-inline";
            saveBar.style.marginTop = "1rem";
            const saveBtn = document.createElement("button");
            saveBtn.type = "button";
            saveBtn.className = "btn btn-primary";
            saveBtn.textContent = "Save schedule";
            saveBar.appendChild(saveBtn);
            wrap.appendChild(saveBar);

            saveBtn.addEventListener("click", async function () {
              try {
                commitActiveFromDom();
                const b = fullSch.branches[activeBranchId];
                if (b && (!b.weekly_open_weekdays || !b.weekly_open_weekdays.length)) {
                  b.weekly_open_weekdays = [6, 0, 1, 2, 3];
                }
                fullSch.version = 2;
                await apiPutSchedule(fullSch);
                notifyScheduleChanged();
                showToast("Schedule saved — public booking updated.", true);
              } catch (err) {
                showToast(err.message || "Save failed", false);
              }
            });
          })();
        }

        function renderBookings(root) {
          setPageHead("Bookings", "Weekly view of patient requests — click a slot to add, click a card to edit.");
          root.innerHTML =
            '<div class="card glass"><p class="empty-hint" style="margin:0">Loading bookings…</p></div>';

          /* — Local helpers — */
          function startOfWeekSun(d) {
            const x = new Date(d);
            x.setHours(0, 0, 0, 0);
            x.setDate(x.getDate() - x.getDay());
            return x;
          }
          function ymdLocal(d) {
            return (
              d.getFullYear() +
              "-" +
              String(d.getMonth() + 1).padStart(2, "0") +
              "-" +
              String(d.getDate()).padStart(2, "0")
            );
          }

          const BRANCH_LABEL = {
            main: "Khalidiyah",
            khalidiya: "Khalifa City A",
          };

          (async () => {
            let scheduleData = null;
            try {
              await apiMarkBookingsViewed();
              await refreshBookings();
            } catch (e) {
              showToast(e.message || "Could not sync booking flags", false);
            }
            try {
              scheduleData = await apiGetSchedule();
            } catch (e) {
              /* schedule is optional for this view */
            }

            root.innerHTML = "";

            /* — State — */
            let weekStart = startOfWeekSun(new Date());
            let branchFilter = "";
            let doctorFilter = "";
            let searchQuery = "";

            /* — KPI strip — */
            const kpi = document.createElement("div");
            kpi.className = "bookings-kpi-row";
            kpi.innerHTML =
              '<div class="bookings-kpi" data-kpi="today"><span class="bookings-kpi__label">Today</span><strong class="bookings-kpi__num">0</strong></div>' +
              '<div class="bookings-kpi" data-kpi="week"><span class="bookings-kpi__label">This week</span><strong class="bookings-kpi__num">0</strong></div>' +
              '<div class="bookings-kpi bookings-kpi--alert" data-kpi="new"><span class="bookings-kpi__label">New (unviewed)</span><strong class="bookings-kpi__num">0</strong></div>';
            root.appendChild(kpi);

            /* — Toolbar — */
            const toolbar = document.createElement("div");
            toolbar.className = "card glass bookings-week-toolbar";

            const fBranch = document.createElement("select");
            fBranch.className = "filter-select";
            fBranch.innerHTML =
              '<option value="">All branches</option>' +
              '<option value="main">Khalidiyah Branch</option>' +
              '<option value="khalidiya">Khalifa City A Branch</option>';

            const fDoc = document.createElement("select");
            fDoc.className = "filter-select";
            fDoc.innerHTML =
              '<option value="">All doctors</option>' +
              (state.doctors || [])
                .map(
                  (d) =>
                    '<option value="' +
                    escapeHtml(d.name?.en || d.name?.ar || "") +
                    '">' +
                    escapeHtml(d.name?.en || d.name?.ar || d.id) +
                    "</option>"
                )
                .join("");

            const navWrap = document.createElement("div");
            navWrap.className = "bookings-week-nav";
            const prevBtn = document.createElement("button");
            prevBtn.type = "button";
            prevBtn.className = "btn btn-ghost";
            prevBtn.textContent = "‹";
            prevBtn.setAttribute("aria-label", "Previous week");
            const titleEl = document.createElement("span");
            titleEl.className = "bookings-week-title";
            const nextBtn = document.createElement("button");
            nextBtn.type = "button";
            nextBtn.className = "btn btn-ghost";
            nextBtn.textContent = "›";
            nextBtn.setAttribute("aria-label", "Next week");
            const todayBtn = document.createElement("button");
            todayBtn.type = "button";
            todayBtn.className = "btn btn-ghost";
            todayBtn.textContent = "Today";
            navWrap.appendChild(prevBtn);
            navWrap.appendChild(titleEl);
            navWrap.appendChild(nextBtn);
            navWrap.appendChild(todayBtn);

            const search = document.createElement("input");
            search.type = "search";
            search.className = "search-input";
            search.placeholder = "Search name, phone, service…";

            const addBtn = document.createElement("button");
            addBtn.type = "button";
            addBtn.className = "btn btn-primary";
            addBtn.textContent = "+ New booking";

            toolbar.appendChild(fBranch);
            toolbar.appendChild(fDoc);
            toolbar.appendChild(navWrap);
            toolbar.appendChild(search);
            toolbar.appendChild(addBtn);
            root.appendChild(toolbar);

            /* — Grid host — */
            const gridHost = document.createElement("div");
            gridHost.className = "card glass bookings-week-host";
            root.appendChild(gridHost);

            /* — Helpers — */
            function activeBranchTimeSlots() {
              if (!scheduleData || !scheduleData.branches) return [];
              if (branchFilter && scheduleData.branches[branchFilter]) {
                const arr = scheduleData.branches[branchFilter].time_slots;
                return Array.isArray(arr) ? arr.slice() : [];
              }
              const set = new Set();
              Object.values(scheduleData.branches).forEach(function (b) {
                (b && b.time_slots ? b.time_slots : []).forEach(function (t) {
                  if (t) set.add(t);
                });
              });
              return Array.from(set).sort();
            }
            function closedDayInfo(branchId, ds) {
              if (!scheduleData || !scheduleData.branches) return null;
              const b = scheduleData.branches[branchId];
              if (!b || !Array.isArray(b.closed_days)) return null;
              return b.closed_days.find(function (x) {
                return x && x.date === ds;
              }) || null;
            }
            function closedTagsForDay(ds) {
              if (!scheduleData || !scheduleData.branches) return [];
              const ids = branchFilter ? [branchFilter] : Object.keys(scheduleData.branches);
              const out = [];
              ids.forEach(function (id) {
                const info = closedDayInfo(id, ds);
                if (info) out.push({ branchId: id, info: info });
              });
              return out;
            }
            function isCellClosedForBranch(ds, branchId) {
              if (!branchId) return false;
              return !!closedDayInfo(branchId, ds);
            }

            function filteredRows() {
              let rows = bookingsCache.slice();
              if (branchFilter) {
                rows = rows.filter(function (r) {
                  return String(r.branch_id || "") === branchFilter;
                });
              }
              if (doctorFilter) rows = rows.filter(function (r) { return r.doctor === doctorFilter; });
              const q = searchQuery.trim().toLowerCase();
              if (q) {
                rows = rows.filter(function (r) {
                  return (
                    String(r.patient_name || "") +
                    String(r.phone || "") +
                    String(r.service || "") +
                    String(r.doctor || "") +
                    String(r.date || "") +
                    String(r.time || "") +
                    String(r.notes || "")
                  )
                    .toLowerCase()
                    .indexOf(q) !== -1;
                });
              }
              return rows;
            }

            function paintKpis() {
              const todayStr = ymdLocal(new Date());
              const wkStart = startOfWeekSun(new Date());
              const wkEndMs = wkStart.getTime() + 7 * 86400000;
              let today = 0,
                week = 0,
                news = 0;
              bookingsCache.forEach(function (b) {
                if (!b) return;
                if (b.date === todayStr) today += 1;
                if (b.date) {
                  const d = new Date(b.date + "T00:00:00");
                  if (!isNaN(d.getTime()) && d.getTime() >= wkStart.getTime() && d.getTime() < wkEndMs) week += 1;
                }
                if (String(b.status || "") === "new") news += 1;
              });
              kpi.querySelector('[data-kpi="today"] .bookings-kpi__num').textContent = String(today);
              kpi.querySelector('[data-kpi="week"] .bookings-kpi__num').textContent = String(week);
              kpi.querySelector('[data-kpi="new"] .bookings-kpi__num').textContent = String(news);
            }
            function paintTitle() {
              const e = new Date(weekStart);
              e.setDate(e.getDate() + 6);
              const fmt = function (d) {
                return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
              };
              titleEl.textContent = fmt(weekStart) + " – " + fmt(e) + ", " + e.getFullYear();
            }

            function paintGrid() {
              paintKpis();
              paintTitle();
              gridHost.innerHTML = "";

              /* Build week dates */
              const days = [];
              for (let i = 0; i < 7; i++) {
                const d = new Date(weekStart);
                d.setDate(d.getDate() + i);
                days.push({ d: d, ds: ymdLocal(d) });
              }
              const wkStartMs = weekStart.getTime();
              const wkEndMs = wkStartMs + 7 * 86400000;

              /* Filter to visible week */
              const allFiltered = filteredRows();
              const visibleRows = allFiltered.filter(function (r) {
                if (!r.date) return false;
                const dt = new Date(r.date + "T00:00:00");
                if (isNaN(dt.getTime())) return false;
                return dt.getTime() >= wkStartMs && dt.getTime() < wkEndMs;
              });

              /* Conflict count: same date+time+doctor */
              const ckCounts = {};
              visibleRows.forEach(function (r) {
                const k = (r.date || "") + "|" + (r.time || "") + "|" + (r.doctor || "");
                ckCounts[k] = (ckCounts[k] || 0) + 1;
              });

              /* Determine slot rows */
              let slots = activeBranchTimeSlots();
              const slotSet = new Set(slots);
              visibleRows.forEach(function (r) {
                if (r.time && !slotSet.has(r.time)) {
                  slots.push(r.time);
                  slotSet.add(r.time);
                }
              });
              slots.sort();
              if (!slots.length) slots = ["—"];

              /* Build grid */
              const grid = document.createElement("div");
              grid.className = "bookings-week-grid";
              grid.style.gridTemplateColumns = "auto repeat(7, minmax(140px, 1fr))";

              const corner = document.createElement("div");
              corner.className = "bw-h-corner";
              corner.textContent = "Time";
              grid.appendChild(corner);

              const todayDs = ymdLocal(new Date());
              days.forEach(function (entry) {
                const h = document.createElement("div");
                h.className = "bw-h-day";
                const closedTags = closedTagsForDay(entry.ds);
                if (closedTags.length) h.classList.add("bw-h-day--closed");
                if (entry.ds === todayDs) h.classList.add("bw-h-day--today");
                const wd = entry.d.toLocaleDateString(undefined, { weekday: "short" });
                const dnum = entry.d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
                let tagHtml = "";
                if (closedTags.length) {
                  const reason = closedTags[0].info.reason_type || "off";
                  const branchTxt = branchFilter
                    ? "Closed"
                    : closedTags.length > 1
                    ? "Closed (all)"
                    : "Closed (" + (BRANCH_LABEL[closedTags[0].branchId] || closedTags[0].branchId) + ")";
                  tagHtml =
                    '<span class="bw-h-day__closed-tag" title="' +
                    escapeHtml(reason) +
                    '">' +
                    escapeHtml(branchTxt) +
                    "</span>";
                }
                h.innerHTML =
                  '<span class="bw-h-day__wd">' +
                  escapeHtml(wd) +
                  "</span>" +
                  '<span class="bw-h-day__date">' +
                  escapeHtml(dnum) +
                  "</span>" +
                  tagHtml;
                grid.appendChild(h);
              });

              slots.forEach(function (t) {
                const tcell = document.createElement("div");
                tcell.className = "bw-h-time";
                tcell.textContent = t;
                grid.appendChild(tcell);

                days.forEach(function (entry) {
                  const cell = document.createElement("button");
                  cell.type = "button";
                  cell.className = "bw-cell";

                  const cellClosed =
                    branchFilter
                      ? isCellClosedForBranch(entry.ds, branchFilter)
                      : closedTagsForDay(entry.ds).length > 0 &&
                        closedTagsForDay(entry.ds).length === Object.keys((scheduleData && scheduleData.branches) || { only: 1 }).length;
                  if (cellClosed) cell.classList.add("bw-cell--closed");

                  const list = visibleRows.filter(function (r) {
                    return r.date === entry.ds && (r.time === t || (t === "—" && !r.time));
                  });

                  if (list.length) {
                    const top = list.slice(0, 3);
                    top.forEach(function (r) {
                      const branchClass =
                        r.branch_id === "main"
                          ? "bw-pill--main"
                          : r.branch_id === "khalidiya"
                          ? "bw-pill--khalidiya"
                          : "bw-pill--neutral";
                      const ck = (r.date || "") + "|" + (r.time || "") + "|" + (r.doctor || "");
                      const isConf = ckCounts[ck] > 1;
                      const isNew = String(r.status || "") === "new";
                      const pill = document.createElement("span");
                      pill.className =
                        "bw-pill " +
                        branchClass +
                        (isConf ? " bw-pill--conflict" : "") +
                        (isNew ? " bw-pill--new" : "");
                      const tooltip =
                        (isConf ? "Conflict — " : "") +
                        (r.patient_name || "—") +
                        " · " +
                        (r.doctor || "—") +
                        (r.branch_id ? " · " + (BRANCH_LABEL[r.branch_id] || r.branch_id) : "");
                      pill.title = tooltip;
                      pill.innerHTML =
                        '<span class="bw-pill__name">' +
                        escapeHtml(r.patient_name || "—") +
                        "</span>" +
                        '<span class="bw-pill__doc">' +
                        escapeHtml(r.doctor || "") +
                        "</span>";
                      pill.addEventListener("click", function (ev) {
                        ev.stopPropagation();
                        openBookingModal("edit", r);
                      });
                      cell.appendChild(pill);
                    });
                    if (list.length > 3) {
                      const more = document.createElement("span");
                      more.className = "bw-more";
                      more.textContent = "+" + (list.length - 3) + " more";
                      more.addEventListener("click", function (ev) {
                        ev.stopPropagation();
                        openBookingModal("edit", list[3]);
                      });
                      cell.appendChild(more);
                    }
                  } else {
                    const ph = document.createElement("span");
                    ph.className = "bw-cell__add";
                    ph.textContent = "+";
                    cell.appendChild(ph);
                  }

                  cell.addEventListener("click", function (ev) {
                    if (ev.target && ev.target.closest && (ev.target.closest(".bw-pill") || ev.target.closest(".bw-more"))) return;
                    if (cell.classList.contains("bw-cell--closed")) return;
                    const docDefault =
                      doctorFilter ||
                      ((state.doctors && state.doctors[0] && (state.doctors[0].name?.en || state.doctors[0].name?.ar)) || "");
                    openBookingModal("create", {
                      id: "",
                      patient_name: "",
                      phone: "",
                      doctor: docDefault,
                      service: "",
                      date: entry.ds,
                      time: t === "—" ? "" : t,
                      status: "viewed",
                      notes: "",
                      branch_id: branchFilter || "",
                    });
                  });

                  grid.appendChild(cell);
                });
              });

              gridHost.appendChild(grid);

              if (!visibleRows.length) {
                const note = document.createElement("p");
                note.className = "help-text";
                note.style.margin = "0.65rem 0 0";
                note.textContent = "No bookings in this week. Click an empty slot to add one.";
                gridHost.appendChild(note);
              }

              window.__repaintBookingsTable = paintGrid;
            }

            /* — Modal (clean up any prior instance from a previous tab visit) — */
            Array.prototype.slice
              .call(document.querySelectorAll("body > .book-modal"))
              .forEach(function (m) {
                m.remove();
              });
            const modal = document.createElement("div");
            modal.className = "book-modal";
            const datalistOptions = (state.doctors || [])
              .map(function (d) {
                return '<option value="' + escapeHtml(d.name?.en || d.name?.ar || d.id) + '">';
              })
              .join("");
            modal.innerHTML =
              '<div class="book-modal__backdrop"></div>' +
              '<div class="book-modal__panel card glass-strong">' +
              '<h3 class="book-modal__title">New booking</h3>' +
              '<div class="book-modal__grid">' +
              '<label class="book-modal__field"><span>Patient name</span><input class="field" data-mk="patient_name" /></label>' +
              '<label class="book-modal__field"><span>Phone</span><input class="field" type="tel" data-mk="phone" /></label>' +
              '<label class="book-modal__field"><span>Doctor</span><input class="field" data-mk="doctor" list="bookModalDocs" /></label>' +
              '<label class="book-modal__field"><span>Branch</span><select class="field" data-mk="branch_id"><option value="">—</option><option value="main">Khalidiyah Branch</option><option value="khalidiya">Khalifa City A Branch</option></select></label>' +
              '<label class="book-modal__field"><span>Service</span><input class="field" data-mk="service" /></label>' +
              '<label class="book-modal__field"><span>Status</span><select class="field" data-mk="status"><option value="new">New</option><option value="viewed">Viewed</option></select></label>' +
              '<label class="book-modal__field"><span>Date</span><input class="field" type="date" data-mk="date" /></label>' +
              '<label class="book-modal__field"><span>Time</span><input class="field" type="text" data-mk="time" placeholder="e.g. 09:30" /></label>' +
              '<label class="book-modal__field book-modal__field--full"><span>Notes</span><textarea class="field" data-mk="notes" rows="3"></textarea></label>' +
              "</div>" +
              '<datalist id="bookModalDocs">' +
              datalistOptions +
              "</datalist>" +
              '<div class="book-modal__actions">' +
              '<button type="button" class="btn btn-danger" data-bm-action="delete">Delete</button>' +
              '<div style="flex:1"></div>' +
              '<button type="button" class="btn btn-ghost" data-bm-action="close">Close</button>' +
              '<button type="button" class="btn btn-primary" data-bm-action="save">Save booking</button>' +
              "</div>" +
              "</div>";
            document.body.appendChild(modal);

            let editingId = "";
            let editingTimestamp = "";
            let editingPatientId = "";

            function openBookingModal(mode, row) {
              const titleNode = modal.querySelector(".book-modal__title");
              titleNode.textContent = mode === "edit" ? "Edit booking" : "New booking";
              modal.querySelectorAll("[data-mk]").forEach(function (el) {
                const k = el.getAttribute("data-mk");
                let v = row && row[k] != null ? String(row[k]) : "";
                if (k === "branch_id" && v !== "main" && v !== "khalidiya") v = "";
                if (k === "status" && v !== "new" && v !== "viewed") v = "viewed";
                el.value = v;
              });
              editingId = row && row.id ? String(row.id) : "";
              editingTimestamp = row && row.timestamp ? String(row.timestamp) : "";
              editingPatientId = row && row.patient_id ? String(row.patient_id) : "";
              modal.querySelector('[data-bm-action="delete"]').style.display = mode === "edit" ? "" : "none";
              modal.classList.add("is-open");
              const firstInput = modal.querySelector('[data-mk="patient_name"]');
              if (firstInput) {
                try {
                  firstInput.focus({ preventScroll: true });
                } catch (eF) {
                  /* no-op */
                }
              }
            }
            function closeBookingModal() {
              modal.classList.remove("is-open");
              editingId = "";
              editingTimestamp = "";
              editingPatientId = "";
            }
            modal.querySelector(".book-modal__backdrop").addEventListener("click", closeBookingModal);
            modal.querySelector('[data-bm-action="close"]').addEventListener("click", closeBookingModal);
            document.addEventListener("keydown", function (ev) {
              if (ev.key === "Escape" && modal.classList.contains("is-open")) closeBookingModal();
            });
            modal.querySelector('[data-bm-action="delete"]').addEventListener("click", async function () {
              if (!editingId) return;
              if (!confirm("Delete this booking?")) return;
              try {
                await apiDeleteBooking(editingId);
                await refreshBookings();
                closeBookingModal();
                paintGrid();
                showToast("Booking removed", true);
              } catch (e) {
                showToast(e.message || "Delete failed", false);
              }
            });
            modal.querySelector('[data-bm-action="save"]').addEventListener("click", async function () {
              const get = function (k) {
                const el = modal.querySelector('[data-mk="' + k + '"]');
                return el ? String(el.value || "").trim() : "";
              };
              const id = editingId || "b" + Date.now();
              const payload = {
                id: id,
                patient_id: editingPatientId || undefined,
                patient_name: get("patient_name") || "—",
                phone: get("phone"),
                doctor: get("doctor"),
                service: get("service") || "Consultation",
                date: get("date"),
                time: get("time"),
                timestamp: editingTimestamp || new Date().toISOString(),
                status: get("status") === "new" ? "new" : "viewed",
                notes: get("notes") ? get("notes") : null,
                branch_id: get("branch_id") || null,
              };
              if (!payload.date) {
                showToast("Date is required", false);
                return;
              }
              try {
                const res = await apiUpsertBooking(payload);
                await refreshBookings();
                const isCreate = !editingId;
                closeBookingModal();
                paintGrid();
                showToast(isCreate ? "Booking added" : "Booking updated", true);
                if (isCreate) {
                  const saved = res && res.booking ? res.booking : payload;
                  track("booking_created", {
                    doctor: saved.doctor,
                    service: saved.service,
                    patient_id: saved.patient_id,
                  });
                }
              } catch (e) {
                showToast(e.message || "Save failed", false);
              }
            });

            /* — Wire toolbar — */
            fBranch.addEventListener("change", function () {

          btnAi.className = "btn btn-ghost";
          btnAi.textContent = "Generate AI Blog";
          toolbar.appendChild(btnAi);

          const aiDraftWrap = document.createElement("label");
          aiDraftWrap.className = "toolbar-inline";
          aiDraftWrap.style.cssText =
            "align-items:center;gap:0.35rem;font-size:0.78rem;color:var(--text-muted);cursor:pointer;user-select:none;";
          const chkAiDraft = document.createElement("input");
          chkAiDraft.type = "checkbox";
          chkAiDraft.id = "blogAiDraftOnly";
          chkAiDraft.title = "If checked, the new post stays hidden from the public blog until you publish it.";
          const lblAiDraft = document.createElement("span");
          lblAiDraft.textContent = "Draft only (do not show on public blog)";
          aiDraftWrap.appendChild(chkAiDraft);
