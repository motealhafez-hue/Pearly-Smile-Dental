<!doctype html>
<html lang="en" class="admin-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="site-prefs-boot.js"></script>
    <title>Clinic Console | Pearly Smile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .admin-root {
        --font-sans: "Inter", system-ui, sans-serif;
        --font-display: "Poppins", var(--font-sans);
        --radius: 14px;
        --radius-sm: 10px;
        --shadow: 0 8px 32px rgba(15, 23, 42, 0.12);
        --shadow-lg: 0 24px 48px rgba(15, 23, 42, 0.18);
        --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        --sidebar-w: 268px;
      }

      .admin-root.theme-dark {
        --bg0: #0c1222;
        --bg1: #111827;
        --surface: rgba(30, 41, 59, 0.55);
        --surface-solid: #1e293b;
        --glass-border: rgba(148, 163, 184, 0.12);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #38bdf8;
        --accent-dim: rgba(56, 189, 248, 0.15);
        --success: #4ade80;
        --danger: #f87171;
        --warning: #fbbf24;
        --input-bg: rgba(15, 23, 42, 0.65);
        --topbar-bg: rgba(17, 24, 39, 0.72);
      }

      .admin-root.theme-light {
        --bg0: #f0f4f8;
        --bg1: #e2e8f0;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-solid: #ffffff;
        --glass-border: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --text-muted: #64748b;
        --accent: #0284c7;
        --accent-dim: rgba(2, 132, 199, 0.1);
        --success: #16a34a;
        --danger: #dc2626;
        --warning: #d97706;
        --input-bg: rgba(255, 255, 255, 0.95);
        --topbar-bg: rgba(255, 255, 255, 0.82);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-sans);
        background: linear-gradient(145deg, var(--bg0) 0%, var(--bg1) 48%, var(--bg0) 100%);
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* Prevent unwanted text selection/caret on admin UI */
      body,
      h1,
      h2,
      h3,
      h4,
      p,
      span,
      strong,
      div,
      article,
      section,
      button,
      a,
      label {
        -webkit-user-select: none;
        user-select: none;
        caret-color: transparent;
      }

      input,
      textarea,
      select,
      option {
        -webkit-user-select: text;
        user-select: text;
        caret-color: auto;
      }

      .glass {
        background: var(--surface);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow);
      }

      .glass-strong {
        background: var(--surface);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-lg);
      }

      /* ——— Login ——— */
      .login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        animation: fadeIn 0.45s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        border-radius: calc(var(--radius) + 4px);
        padding: 2rem 2rem 1.75rem;
        animation: slideUp 0.5s ease;
      }

      .login-card h1 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }

      .login-card .sub {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin: 0 0 1.5rem;
        line-height: 1.5;
      }

      .login-card label {
        display: block;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .login-card input {
        width: 100%;
        margin-bottom: 1rem;
      }

      /* ——— App shell ——— */
      .app-shell {
        display: flex;
        min-height: 100vh;
        animation: fadeIn 0.35s ease;
      }

      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        padding: 1.25rem 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        border-right: 1px solid var(--glass-border);
      }

      .sidebar-brand {
        padding: 0.5rem 0.85rem 1.25rem;
        border-bottom: 1px solid var(--glass-border);
        margin-bottom: 0.5rem;
      }

      .sidebar-brand .logo {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
      }

      .sidebar-brand .tag {
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-top: 0.2rem;
      }

      .nav-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: none;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--text-muted);
        font: inherit;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        text-align: left;
        transition: background var(--transition), color var(--transition), transform 0.15s ease;
      }

      .nav-btn:hover {
        background: var(--accent-dim);
        color: var(--text);
        transform: translateX(2px);
      }

      .nav-btn.active {
        background: var(--accent-dim);
        color: var(--accent);
        font-weight: 600;
      }

      .nav-btn .ico {
        width: 1.25rem;
        text-align: center;
        opacity: 0.85;
      }

      .nav-btn__main {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        min-width: 0;
        text-align: left;
      }

      .nav-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 1.35rem;
        height: 1.35rem;
        padding: 0 0.38rem;
        font-size: 0.68rem;
        font-weight: 700;
        line-height: 1;
        color: #fff;
        background: var(--danger);
        border-radius: 999px;
        flex-shrink: 0;
      }

      .nav-badge[hidden] {
        display: none !important;
      }

      .sidebar-foot {
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid var(--glass-border);
      }

      .main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 0.85rem 1.35rem;
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        background: var(--topbar-bg);
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .menu-toggle {
        display: none;
        width: 42px;
        height: 42px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-size: 1.1rem;
      }

      .save-status {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        background: var(--accent-dim);
      }

      .save-status.saving {
        color: var(--warning);
      }

      .save-status.saved {
        color: var(--success);
      }

      .save-status.error {
        color: var(--danger);
      }

      .save-status .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.85;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 0.55rem 1.1rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow var(--transition), background var(--transition);
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #0ea5e9);
        border-color: transparent;
        color: #fff;
      }

      .theme-light .btn-primary {
        color: #fff;
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-danger {
        border-color: rgba(248, 113, 113, 0.35);
        color: var(--danger);
        background: rgba(248, 113, 113, 0.08);
      }

      .btn-icon {
        width: 42px;
        height: 42px;
        padding: 0;
        border-radius: var(--radius-sm);
      }

      .main-scroll {
        flex: 1;
        overflow: auto;
        padding: 1.35rem 1.5rem 2.5rem;
        animation: slideUp 0.4s ease;
      }

      .page-head {
        margin-bottom: 1.35rem;
      }

      .page-head h2 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }

      .page-head p {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .grid-kpi {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      @media (max-width: 1100px) {
        .grid-kpi {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 520px) {
        .grid-kpi {
          grid-template-columns: 1fr;
        }
      }

      .kpi-card {
        border-radius: var(--radius);
        padding: 1.15rem 1.25rem;
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .kpi-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }

      .kpi-card .label {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .kpi-card .value {
        font-family: var(--font-display);
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .kpi-card .hint {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.35rem;
      }

      /* ——— Analytics dashboard ——— */
      .analytics-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }

      .analytics-page {
        display: flex;
        flex-direction: column;
        gap: 1.75rem;
        animation: analyticsFadeIn 0.45s ease;
      }

      @keyframes analyticsFadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .analytics-section {
        margin: 0;
      }

      .analytics-section-head {
        margin-bottom: 1rem;
      }

      .analytics-section-title {
        font-family: var(--font-display);
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .analytics-section-desc {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-muted);
        line-height: 1.5;
        max-width: 52rem;
      }

      .analytics-kpi-hero {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        margin-bottom: 0;
      }

      @media (max-width: 1200px) {
        .analytics-kpi-hero {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .analytics-kpi-hero {
          grid-template-columns: 1fr;
        }
      }

      .kpi-card .kpi-ico {
        font-size: 1.35rem;
        margin-bottom: 0.25rem;
        opacity: 0.9;
      }

      .analytics-grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      @media (max-width: 900px) {
        .analytics-grid-2 {
          grid-template-columns: 1fr;
        }
      }

      .analytics-grid-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
      }

      @media (max-width: 1000px) {
        .analytics-grid-3 {
          grid-template-columns: 1fr;
        }
      }

      .analytics-chart-panel canvas {
        display: block;
        width: 100%;
        max-height: 220px;
      }

      .analytics-funnel-rail {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 0.65rem;
      }

      .analytics-funnel-step {
        flex: 1 1 140px;
        min-width: 120px;
        padding: 1rem 0.85rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        position: relative;
        transition: transform var(--transition), border-color var(--transition);
      }

      .analytics-funnel-step:hover {
        transform: translateY(-2px);
        border-color: rgba(56, 189, 248, 0.35);
      }

      .analytics-funnel-step__n {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text);
      }

      .analytics-funnel-step__l {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-top: 0.35rem;
      }

      .analytics-funnel-step__pct {
        font-size: 0.8rem;
        color: var(--accent);
        margin-top: 0.25rem;
        font-weight: 600;
      }

      .analytics-funnel-arrow {
        align-self: center;
        color: var(--text-muted);
        font-size: 1.1rem;
        flex: 0 0 auto;
      }

      @media (max-width: 700px) {
        .analytics-funnel-arrow {
          display: none;
        }
      }

      .analytics-css-bars {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .analytics-css-bar {
        display: grid;
        grid-template-columns: 2.5rem 1fr 2.5rem;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.78rem;
      }

      .analytics-css-bar .track {
        height: 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.15);
        overflow: hidden;
      }

      .analytics-css-bar .fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), rgba(56, 189, 248, 0.35));
        transition: width 0.6s ease;
      }

      .analytics-ai-panel {
        border-left: 3px solid var(--accent);
        padding-left: 1rem;
      }

      .analytics-ai-panel ul {
        margin: 0.5rem 0 0;
        padding-left: 1.15rem;
        color: var(--text);
        line-height: 1.65;
      }

      .analytics-ai-panel li {
        margin: 0.4rem 0;
      }

      .analytics-sub-kpi {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.75rem;
      }

      @media (max-width: 900px) {
        .analytics-sub-kpi {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 480px) {
        .analytics-sub-kpi {
          grid-template-columns: 1fr;
        }
      }

      .analytics-mini-stat {
        padding: 0.85rem 1rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
      }

      .analytics-mini-stat .lbl {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
      }

      .analytics-mini-stat .val {
        font-family: var(--font-display);
        font-size: 1.2rem;
        font-weight: 700;
        margin-top: 0.25rem;
      }

      .analytics-tables-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      @media (max-width: 1100px) {
        .analytics-tables-grid {
          grid-template-columns: 1fr;
        }
      }

      .analytics-loading {
        animation: analyticsFadeIn 0.35s ease;
      }

      .card {
        border-radius: var(--radius);
        padding: 1.25rem 1.35rem;
        margin-bottom: 1rem;
        transition: box-shadow var(--transition);
      }

      .card:hover {
        box-shadow: var(--shadow);
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
        margin: 0 0 1rem;
        color: var(--text);
      }

      .toolbar-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        align-items: center;
        margin-bottom: 1rem;
      }

      .search-input {
        flex: 1;
        min-width: 180px;
        max-width: 320px;
        padding: 0.55rem 0.85rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
      }

      .search-input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      select.filter-select {
        padding: 0.55rem 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.8rem;
        cursor: pointer;
      }

      label.floating-label,
      .floating-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      input.field,
      textarea.field {
        width: 100%;
        padding: 0.55rem 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
        transition: border-color var(--transition), box-shadow var(--transition);
      }

      input.field:focus,
      textarea.field:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }

      textarea.field {
        min-height: 4.5rem;
        resize: vertical;
      }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.85rem;
      }

      .lang-tools {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
      }

      .btn-auto-translate {
        border: 1px solid var(--glass-border);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border-radius: 999px;
        padding: 6px 10px;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
        transition: transform var(--transition), border-color var(--transition), background var(--transition);
      }

      .btn-auto-translate:hover {
        transform: translateY(-1px);
        border-color: rgba(56, 189, 248, 0.35);
        background: rgba(56, 189, 248, 0.10);
      }

      .btn-auto-translate[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      @media (max-width: 640px) {
        .row-2 {
          grid-template-columns: 1fr;
        }
      }

      .item {
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        padding: 1rem 1.1rem;
        margin-bottom: 0.75rem;
        background: var(--input-bg);
        transition: border-color var(--transition);
      }

      .item:hover {
        border-color: rgba(56, 189, 248, 0.25);
      }

      .item-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.75rem;
        margin-bottom: 0.85rem;
        flex-wrap: wrap;
      }

      .item-head strong {
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
      }

      table.data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      .data-table th,
      .data-table td {
        padding: 0.75rem 1rem;
        text-align: left;
        border-bottom: 1px solid var(--glass-border);
      }

      .data-table th {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        font-weight: 600;
        background: var(--accent-dim);
      }

      .data-table tr:last-child td {
        border-bottom: none;
      }

      .data-table tbody tr {
        transition: background var(--transition);
      }

      .data-table tbody tr:hover {
        background: var(--accent-dim);
      }

      .pill-status {
        display: inline-block;
        padding: 0.2rem 0.45rem;
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-radius: 6px;
      }

      .pill-status--new {
        background: rgba(248, 113, 113, 0.25);
        color: #fecaca;
      }

      .pill-status--viewed {
        background: var(--accent-dim);
        color: var(--text-muted);
      }

      .phone-link {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }

      .phone-link:hover {
        text-decoration: underline;
      }

      .td-phone-wrap {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.35rem 0.5rem;
        min-width: 140px;
      }

      .td-phone-wrap .field {
        flex: 1;
        min-width: 100px;
      }

      .mono-ts {
        font-size: 0.78rem;
        color: var(--text-muted);
        white-space: nowrap;
      }

      /* Bookings tab — readable cards (no cramped table) */
      .sched-cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 6px;
        margin-top: 0.75rem;
      }
      .sched-cal-h {
        font-size: 0.72rem;
        color: var(--text-muted);
        text-align: center;
      }
      .sched-cal-cell {
        min-height: 38px;
        border-radius: 10px;
        border: 1px solid var(--glass-border);
        background: var(--surface);
        font-weight: 600;
        cursor: pointer;
      }
      .sched-cal-day.is-closed {
        background: rgba(248, 113, 113, 0.2);
        border-color: rgba(248, 113, 113, 0.45);
      }
      .sched-cal-day.is-today {
        outline: 2px solid var(--accent);
      }
      .sched-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 0.5rem;
      }
      .sched-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        font-size: 0.85rem;
      }
      .sched-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .sched-wd-row,
      .sched-wd-mini {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .sched-doc-card {
        margin-bottom: 0.85rem;
      }
      .sched-toggle input {
        width: 18px;
        height: 18px;
      }
      .schedule-admin-v2.sched-admin-stack {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      .schedule-admin-v2.sched-admin-stack > .card.glass {
        margin: 0;
      }
      .schedule-admin-v2 .sched-branch-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 0;
      }
      .sched-branch-pill {
        border-radius: 999px;
        font-weight: 600;
      }
      .sched-branch-pill--main.is-active {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.35), rgba(59, 130, 246, 0.12));
        border-color: rgba(59, 130, 246, 0.55);
      }
      .sched-branch-pill--khalidiya.is-active {
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.35), rgba(16, 185, 129, 0.12));
        border-color: rgba(16, 185, 129, 0.55);
      }
      .sched-v2-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.25rem;
      }
      @media (max-width: 900px) {
        .sched-v2-grid {
          grid-template-columns: 1fr;
        }
      }
      .sched-branch-tag {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 8px;
        margin-bottom: 0.75rem;
      }
      .sched-branch-tag--main {
        background: rgba(59, 130, 246, 0.2);
        color: var(--text, #e2e8f0);
      }
      .sched-branch-tag--khalidiya {
        background: rgba(16, 185, 129, 0.2);
        color: var(--text, #e2e8f0);
      }
      .sched-closed-editor {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }
      .sched-closed-card {
        border-radius: var(--radius-sm, 12px);
        border: 1px solid var(--glass-border);
        padding: 0.75rem 1rem;
        background: var(--surface, rgba(255, 255, 255, 0.04));
      }
      .sched-closed-card__row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 0.5rem;
      }
      .sched-cal-nav-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0.5rem 0;
      }
      .sched-cal-title {
        font-weight: 700;
        font-size: 0.95rem;
      }
      .sched-toggle--inline {
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .btn-xs {
        padding: 0 6px;
        font-size: 0.85rem;
        min-height: auto;
      }
      .bookings-wrap {
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        padding: 1rem;
        background: var(--accent-dim);
      }

      .bookings-list {
        display: flex;
        flex-direction: column;
        gap: 1.1rem;
      }

      .booking-card {
        border-radius: var(--radius);
        border: 1px solid var(--glass-border);
        padding: 1.2rem 1.35rem;
        background: var(--input-bg);
        box-shadow: var(--shadow);
        transition: border-color var(--transition), box-shadow var(--transition);
      }

      .booking-card:hover {
        border-color: rgba(56, 189, 248, 0.22);
      }

      .booking-card input,
      .booking-card textarea,
      .booking-card select {
        -webkit-user-select: text;
        user-select: text;
      }

      .booking-card.booking-row--new {
        box-shadow: inset 3px 0 0 var(--danger), var(--shadow);
        background: rgba(248, 113, 113, 0.06);
        border-color: rgba(248, 113, 113, 0.2);
      }

      .admin-root.theme-light .booking-card.booking-row--new {
        background: rgba(220, 38, 38, 0.05);
      }

      .booking-card__head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 1rem;
        padding-bottom: 0.85rem;
        border-bottom: 1px solid var(--glass-border);
      }

      .booking-card__head .booking-status {
        min-width: 8rem;
      }

      .booking-card__primary {
        margin-bottom: 1.1rem;
      }

      .booking-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .booking-card .field--patient,
      .booking-card textarea.field[data-k="patient_name"] {
        width: 100%;
        min-height: 3.1rem;
        padding: 0.65rem 0.85rem;
        font-size: 1.02rem;
        font-weight: 600;
        line-height: 1.45;
        resize: vertical;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: anywhere;
      }

      .booking-card textarea.field[data-k="notes"] {
        width: 100%;
        min-height: 4rem;
        padding: 0.65rem 0.85rem;
        font-size: 0.9rem;
        line-height: 1.5;
        resize: vertical;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: anywhere;
      }

      .booking-card__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem 1.25rem;
        margin-bottom: 1rem;
      }

      .booking-field .field {
        width: 100%;
        padding: 0.55rem 0.75rem;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .booking-card .td-phone-wrap {
        min-width: 0;
        margin-top: 0.15rem;
      }

      .booking-card .td-phone-wrap .field {
        min-width: 0;
        flex: 1 1 12rem;
        max-width: 100%;
        padding: 0.55rem 0.75rem;
        font-size: 0.95rem;
      }

      .booking-card__booked {
        font-size: 0.82rem;
        color: var(--text-muted);
        line-height: 1.5;
        word-break: break-word;
        margin-bottom: 1rem;
        padding: 0.5rem 0.65rem;
        border-radius: var(--radius-sm);
        background: var(--accent-dim);
      }

      .booking-card__booked strong {
        color: var(--text);
        font-weight: 600;
      }

      @media (max-width: 720px) {
        .booking-card__grid {
          grid-template-columns: 1fr;
        }

        .booking-card {
          padding: 1rem 1rem;
        }
      }

      .empty-hint {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .help-text {
        margin: -0.5rem 0 0.75rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .pill {
        display: inline-block;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 600;
        background: var(--accent-dim);
        color: var(--accent);
      }

      /* Uploader (shared) */
      .uploader {
        --uploader-w: 72px;
        --uploader-h: 72px;
        display: flex;
        gap: 0.65rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .uploader-preview {
        width: var(--uploader-w);
        height: var(--uploader-h);
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        overflow: hidden;
        flex: 0 0 auto;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .uploader-preview img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .uploader-status {
        position: absolute;
        right: 8px;
        bottom: 8px;
        display: none;
      }

      .uploader-drop {
        flex: 1;
        min-height: var(--uploader-h);
        border-radius: var(--radius-sm);
        border: 1px dashed var(--glass-border);
        background: rgba(2, 132, 199, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0.75rem;
        min-width: 220px;
      }

      .uploader-drop .title {
        font-weight: 700;
      }

      .uploader-drop .sub {
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      .uploader-drop.is-dragover {
        border-color: rgba(56, 189, 248, 0.55);
        background: rgba(56, 189, 248, 0.06);
      }

      @media (max-width: 520px) {
        .uploader-drop {
          min-width: 100%;
        }
      }

      /* Hero focal-point studio (blog editor) */
      .hero-focal-studio {
        margin-top: 1rem;
        padding: 1rem 1.1rem 1.15rem;
        border-radius: var(--radius-md, 14px);
        border: 1px solid var(--glass-border);
        background: linear-gradient(
          165deg,
          color-mix(in srgb, var(--surface) 92%, var(--primary) 4%) 0%,
          color-mix(in srgb, var(--surface) 96%, transparent) 100%
        );
        box-shadow: 0 12px 40px -24px rgba(15, 23, 42, 0.35);
      }

      html.dark-theme .hero-focal-studio {
        box-shadow: 0 14px 44px -22px rgba(0, 0, 0, 0.55);
      }

      .hero-focal-studio__title {
        font-weight: 800;
        font-size: 0.92rem;
        letter-spacing: -0.02em;
        margin: 0 0 0.2rem;
      }

      .hero-focal-studio__hint {
        font-size: 0.76rem;
        color: var(--text-muted);
        line-height: 1.45;
        margin: 0 0 0.85rem;
      }

      .hero-focal-studio__frame {
        position: relative;
        width: 100%;
        max-width: 440px;
        aspect-ratio: 21 / 9;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
        background: repeating-conic-gradient(
            color-mix(in srgb, var(--text-muted) 12%, transparent) 0% 25%,
            transparent 0% 50%
          )
          50% / 14px 14px;
        cursor: crosshair;
        touch-action: none;
        margin-bottom: 0.85rem;
      }

      .hero-focal-studio__frame.is-disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .hero-focal-studio__frame img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
        display: block;
      }

      .hero-focal-studio__dot {
        position: absolute;
        width: 14px;
        height: 14px;
        margin-left: -7px;
        margin-top: -7px;
        border-radius: 999px;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.35), 0 4px 14px rgba(15, 23, 42, 0.25);
        background: color-mix(in srgb, var(--primary) 88%, #fff);
        pointer-events: none;
        z-index: 2;
      }

      .hero-focal-studio__sliders {
        display: grid;
        gap: 0.55rem 1rem;
        max-width: 440px;
        margin-bottom: 0.65rem;
      }

      .hero-focal-studio__sliders label {
        display: grid;
        gap: 0.2rem;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .hero-focal-studio__sliders input[type="range"] {
        width: 100%;
        accent-color: var(--primary);
      }

      .hero-focal-studio__readout {
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        color: var(--text-secondary);
        margin-bottom: 0.55rem;
      }

      .hero-focal-studio__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }

      .doctor-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .doctor-chip {
        border-radius: var(--radius-sm);
        padding: 0.75rem 1rem;
        min-width: 140px;
        flex: 1 1 160px;
        max-width: 220px;
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .doctor-chip:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }

      .doctor-chip .n {
        font-weight: 600;
        font-size: 0.88rem;
        margin-bottom: 0.2rem;
      }

      .doctor-chip .r {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.85rem;
      }

      @media (max-width: 720px) {
        .quick-grid {
          grid-template-columns: 1fr;
        }
      }

      .analytics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
      }

      .stat-block {
        border-radius: var(--radius-sm);
        padding: 1rem 1.1rem;
        text-align: center;
      }

      .stat-block .num {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent);
      }

      .stat-block .lbl {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      /* Mobile sidebar */
      @media (max-width: 900px) {
        .menu-toggle {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          z-index: 100;
          transform: translateX(-102%);
          transition: transform var(--transition);
          box-shadow: var(--shadow-lg);
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .sidebar-backdrop {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.45);
          z-index: 99;
          backdrop-filter: blur(2px);
        }

        .sidebar-backdrop.show {
          display: block;
        }
      }

      /* Toasts */
      .toast-stack {
        position: fixed;
        bottom: 1.25rem;
        right: 1.25rem;
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        max-width: min(400px, 92vw);
        pointer-events: none;
      }

      .toast {
        padding: 0.75rem 1.1rem;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
        box-shadow: var(--shadow-lg);
        transform: translateX(120%);
        opacity: 0;
        transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease;
        pointer-events: auto;
        border: 1px solid var(--glass-border);
      }

      .toast.show {
        transform: translateX(0);
        opacity: 1;
      }

      .toast.ok {
        background: rgba(22, 101, 52, 0.92);
        color: #ecfdf5;
        border-color: rgba(74, 222, 128, 0.35);
      }

      .toast.err {
        background: rgba(127, 29, 29, 0.92);
        color: #fef2f2;
        border-color: rgba(248, 113, 113, 0.35);
      }

      .login-error {
        color: var(--danger);
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }

      a.link-site {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.875rem;
      }

      a.link-site:hover {
        text-decoration: underline;
      }

      .hidden {
        display: none !important;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      .login-card code,
      .sub code {
        font-size: 0.85em;
        padding: 0.1em 0.35em;
        border-radius: 4px;
        background: var(--accent-dim);
        color: var(--accent);
      }

      /* ─── Bookings: KPI strip ─── */
      .bookings-kpi-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.85rem;
        margin-bottom: 1rem;
      }
      .bookings-kpi {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        padding: 0.95rem 1.1rem;
        border-radius: var(--radius);
        background: var(--surface);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow);
      }
      .bookings-kpi__label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
      }
      .bookings-kpi__num {
        font-family: var(--font-display);
        font-size: 1.55rem;
        font-weight: 700;
        line-height: 1.1;
      }
      .bookings-kpi--alert .bookings-kpi__num {
        color: var(--danger);
      }

      /* ─── Bookings: toolbar ─── */
      .bookings-week-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 0.65rem;
        padding: 0.7rem 0.85rem;
        margin-bottom: 0.85rem;
      }
      .bookings-week-toolbar .filter-select,
      .bookings-week-toolbar .search-input {
        max-width: 16rem;
      }
      .bookings-week-nav {
        display: inline-flex;
        align-items: center;
        gap: 0.2rem;
        padding: 0.15rem 0.3rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
      }
      .bookings-week-nav .btn {
        min-width: 2rem;
        padding: 0.25rem 0.55rem;
        line-height: 1;
      }
      .bookings-week-title {
        padding: 0 0.5rem;
        font-weight: 700;
        min-width: 12rem;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }

      /* ─── Bookings: weekly grid ─── */
      .bookings-week-host {
        padding: 0.85rem;
        overflow-x: auto;
      }
      .bookings-week-host .empty-hint {
        padding: 1.5rem 1rem;
      }
      .bookings-week-grid {
        display: grid;
        gap: 1px;
        background: var(--glass-border);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        overflow: hidden;
        min-width: 1080px;
      }
      .bw-h-corner,
      .bw-h-time,
      .bw-h-day,
      .bw-cell {
        background: var(--input-bg);
        padding: 0.55rem 0.65rem;
      }
      .bw-h-corner {
        font-weight: 700;
        font-size: 0.72rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .bw-h-time {
        font-weight: 600;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 64px;
        font-variant-numeric: tabular-nums;
      }
      .bw-h-day {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        align-items: flex-start;
        min-height: 64px;
      }
      .bw-h-day__wd {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
      }
      .bw-h-day__date {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .bw-h-day__closed-tag {
        font-size: 0.65rem;
        padding: 0.1rem 0.4rem;
        border-radius: 999px;
        background: rgba(248, 113, 113, 0.15);
        color: var(--danger);
        margin-top: 0.15rem;
        font-weight: 700;
      }
      .bw-h-day--today .bw-h-day__date {
        color: var(--accent);
      }
      .bw-h-day--today {
        box-shadow: inset 0 -3px 0 var(--accent);
      }
      .bw-h-day--closed,
      .bw-cell--closed {
        background: repeating-linear-gradient(
          45deg,
          var(--input-bg),
          var(--input-bg) 10px,
          rgba(248, 113, 113, 0.06) 10px,
          rgba(248, 113, 113, 0.06) 20px
        );
      }
      .bw-cell {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        min-height: 64px;
        text-align: left;
        cursor: pointer;
        transition: background var(--transition);
        border: 0;
        font: inherit;
        color: inherit;
      }
      .bw-cell:hover {
        background: var(--accent-dim);
      }
      .bw-cell--closed {
        cursor: default;
      }
      .bw-cell--closed:hover {
        background: repeating-linear-gradient(
          45deg,
          var(--input-bg),
          var(--input-bg) 10px,
          rgba(248, 113, 113, 0.06) 10px,
          rgba(248, 113, 113, 0.06) 20px
        );
      }
      .bw-cell__add {
        opacity: 0;
        align-self: center;
        color: var(--text-muted);
        font-size: 1.2rem;
        line-height: 1;
        transition: opacity var(--transition);
      }
      .bw-cell:hover .bw-cell__add {
        opacity: 0.7;
      }
      .bw-cell--closed .bw-cell__add {
        display: none;
      }

      /* ─── Bookings: pills ─── */
      .bw-pill {
        display: flex;
        flex-direction: column;
        gap: 0.1rem;
        padding: 0.32rem 0.5rem 0.32rem 0.6rem;
        border-radius: var(--radius-sm);
        background: var(--surface-solid);
        border: 1px solid var(--glass-border);
        border-left: 3px solid var(--text-muted);
        cursor: pointer;
        transition: transform var(--transition), border-color var(--transition);
        text-align: left;
        min-width: 0;
        position: relative;
      }
      .bw-pill:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
      }
      .bw-pill__name {
        font-weight: 700;
        font-size: 0.85rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bw-pill__doc {
        font-size: 0.72rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bw-pill--main {
        border-left-color: #38bdf8;
      }
      .bw-pill--khalidiya {
        border-left-color: #34d399;
      }
      .bw-pill--new {
        box-shadow: inset 4px 0 0 var(--danger);
      }
      .bw-pill--conflict {
        box-shadow: 0 0 0 2px var(--danger);
      }
      .bw-pill--conflict::after {
        content: "!";
        position: absolute;
        top: -6px;
        right: -6px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--danger);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.68rem;
        font-weight: 800;
      }
      .bw-more {
        font-size: 0.72rem;
        color: var(--accent);
        align-self: flex-start;
        padding: 0.1rem 0.4rem;
        border-radius: 999px;
        border: 1px dashed rgba(56, 189, 248, 0.4);
        background: var(--accent-dim);
        cursor: pointer;
        font-weight: 700;
      }

      /* ─── Booking modal ─── */
      .book-modal {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .book-modal.is-open {
        display: flex;
      }
      .book-modal__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(2, 6, 23, 0.55);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .book-modal__panel {
        position: relative;
        z-index: 1;
        width: min(720px, 100%);
        padding: 1.25rem 1.4rem 1.1rem;
        border-radius: var(--radius);
        animation: slideUp 0.2s ease;
        max-height: 90vh;
        overflow-y: auto;
      }
      .book-modal__title {
        margin: 0 0 1rem;
        font-family: var(--font-display);
        font-size: 1.15rem;
        font-weight: 700;
      }
      .book-modal__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.85rem;
      }
      .book-modal__field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .book-modal__field > span {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
      }
      .book-modal__field--full {
        grid-column: 1 / -1;
      }
      .book-modal__actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.1rem;
        padding-top: 0.85rem;
        border-top: 1px solid var(--glass-border);
      }
      @media (max-width: 720px) {
        .bookings-kpi-row {
          grid-template-columns: 1fr;
        }
        .book-modal__grid {
          grid-template-columns: 1fr;
        }
      }

      /* ─── Schedule: 3 sections + collapsible doctor rows ─── */
      .sched-section {
        margin-bottom: 1.1rem;
      }
      .sched-section .section-title {
        margin: 0 0 0.85rem;
      }
      .sched-section__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 0.85rem;
      }
      .sched-section__header h3 {
        margin: 0;
      }
      .sched-section--off .sched-cal-grid {
        margin-top: 0.5rem;
      }
      .sched-doc-card {
        padding: 0;
        margin-bottom: 0.65rem;
      }
      .sched-doc-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        padding: 0.85rem 1rem;
        border: 0;
        background: transparent;
        cursor: pointer;
        width: 100%;
        text-align: left;
        color: inherit;
        font: inherit;
        border-radius: var(--radius);
      }
      .sched-doc-summary:hover {
        background: var(--accent-dim);
      }
      .sched-doc-summary__name {
        font-weight: 700;
        font-size: 0.95rem;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sched-doc-summary__meta {
        display: flex;
        gap: 0.4rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .sched-doc-summary__pill {
        font-size: 0.68rem;
        font-weight: 700;
        padding: 0.18rem 0.55rem;
        border-radius: 999px;
        background: var(--accent-dim);
        color: var(--accent);
      }
      .sched-doc-summary__pill--ok {
        background: rgba(74, 222, 128, 0.15);
        color: var(--success);
      }
      .sched-doc-summary__pill--paused {
        background: rgba(248, 113, 113, 0.15);
        color: var(--danger);
      }
      .sched-doc-summary__chev {
        color: var(--text-muted);
        transition: transform 0.2s ease;
        font-size: 1rem;
        line-height: 1;
      }
      .sched-doc-card.is-open .sched-doc-summary__chev {
        transform: rotate(90deg);
      }
      .sched-doc-body {
        display: none;
        padding: 0 1rem 1rem;
      }
      .sched-doc-card.is-open .sched-doc-body {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <div class="login-card glass-strong">
        <h1>Pearly Smile</h1>
        <p class="sub">Clinic console — manage public site content. Saves to <code>api/data.json</code> on the server.</p>
        <label for="u">Username</label>
        <input id="u" class="field" autocomplete="username" />
        <label for="p">Password</label>
        <input id="p" class="field" type="password" autocomplete="current-password" />
        <p class="sub" style="margin-bottom: 1rem; font-size: 0.8rem">
          Default: <strong>admin</strong> / <strong>pearly-admin</strong>
        </p>
        <button type="button" class="btn btn-primary" id="btnLogin" style="width: 100%">Sign in</button>
        <p class="login-error" id="loginErr"></p>
      </div>
    </div>

    <div id="appDash" class="app-shell hidden">
      <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>
      <aside class="sidebar glass" id="sidebar">
        <div class="sidebar-brand">
          <div class="logo">Pearly Smile</div>
          <div class="tag">Dental · Admin</div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav" aria-label="Main"></nav>
        <div class="sidebar-foot">
          <button type="button" class="nav-btn" id="btnLogout">
            <span class="ico">⎋</span> Log out
          </button>
          <a class="nav-btn" href="index.html" style="text-decoration: none; color: inherit">
            <span class="ico">↗</span> View website
          </a>
        </div>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button type="button" class="menu-toggle glass" id="menuToggle" aria-label="Open menu">☰</button>
            <div id="saveStatus" class="save-status" aria-live="polite">
              <span class="dot"></span>
              <span id="saveStatusText">Saved</span>
            </div>
          </div>
          <div class="topbar-actions">
            <button type="button" class="btn btn-ghost" id="btnReload" title="Reload from server">Reload</button>
            <button type="button" class="btn btn-primary" id="btnSave">Save changes</button>
            <button type="button" class="btn btn-icon glass" id="btnTheme" title="Toggle theme">◐</button>
          </div>
        </header>
        <div class="main-scroll">
          <div class="page-head" id="pageHead"></div>
          <div id="mainContent"></div>
        </div>
      </div>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>

    <script>
      (function () {
        const TOKEN_KEY = "ps_admin_token";
        const THEME_KEY = "ps-theme";

        const apiBase = (function () {
          try {
            if (location.protocol === "file:") return "http://127.0.0.1:8000";
            var h = String(location.hostname || "").toLowerCase();
            if (h === "127.0.0.1" || h === "localhost" || h === "[::1]") {
              return "http://127.0.0.1:8000";
            }
            return location.origin;
          } catch (e) {
            return "http://127.0.0.1:8000";
          }
        })();

        let state = null;
        let token = sessionStorage.getItem(TOKEN_KEY);
        let activeRoute = "overview";
        let dirty = false;
        let saveState = "saved";

        const $ = (id) => document.getElementById(id);

        function setTheme(dark) {
          const root = document.documentElement;
          root.classList.toggle("theme-dark", dark);
          root.classList.toggle("theme-light", !dark);
          localStorage.setItem(THEME_KEY, dark ? "dark" : "light");
        }

        function initTheme() {
          const t = localStorage.getItem(THEME_KEY);
          if (t === "light") setTheme(false);
          else setTheme(true);
        }
        initTheme();

        $("btnTheme").addEventListener("click", () => {
          const dark = !document.documentElement.classList.contains("theme-dark");
          setTheme(dark);
        });

        function markDirty() {
          dirty = true;
          saveState = "unsaved";
          updateSaveStatus();
        }

        function markSaved() {
          dirty = false;
          saveState = "saved";
          updateSaveStatus();
        }

        function updateSaveStatus() {
          const el = $("saveStatus");
          const txt = $("saveStatusText");
          el.classList.remove("saving", "saved", "error");
          if (saveState === "saving") {
            el.classList.add("saving");
            txt.textContent = "Saving…";
          } else if (saveState === "error") {
            el.classList.add("error");
            txt.textContent = "Save failed";
          } else if (dirty) {
            txt.textContent = "Unsaved changes";
          } else {
            el.classList.add("saved");
            txt.textContent = "Saved";
          }
        }

        function showToast(msg, ok) {
          const stack = $("toastStack");
          const t = document.createElement("div");
          t.className = "toast " + (ok ? "ok" : "err");
          t.textContent = msg;
          stack.appendChild(t);
          requestAnimationFrame(() => t.classList.add("show"));
          setTimeout(() => {
            t.classList.remove("show");
            setTimeout(() => t.remove(), 350);
          }, 3200);
        }

        function authHeaders() {
          const h = { "Content-Type": "application/json" };
          if (token) h["Authorization"] = "Bearer " + token;
          return h;
        }

        async function apiGet() {
          const r = await fetch(apiBase + "/api/data");
          if (!r.ok) throw new Error("Failed to load data");
          return r.json();
        }

        async function apiSave(body) {
          const r = await fetch(apiBase + "/api/data", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(body),
          });
          if (r.status === 401) {
            token = null;
            sessionStorage.removeItem(TOKEN_KEY);
            throw new Error("Session expired — sign in again");
          }
          if (!r.ok) {
            const t = await r.text();
            throw new Error(t || "Save failed");
          }
          return r.json();
        }

        async function apiLogin(user, pass) {
          const r = await fetch(apiBase + "/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass }),
          });
          if (!r.ok) throw new Error("Invalid credentials");
          const j = await r.json();
          return j.token;
        }

        // -----------------------------
        // Bookings API (separate store)
        // -----------------------------
        let bookingsCache = [];

        async function apiGetBookings() {
          const r = await fetch(apiBase + "/api/bookings", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load bookings");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        async function apiUpsertBooking(booking) {
          const r = await fetch(apiBase + "/api/bookings", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(booking),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            const t = await r.text();
            throw new Error(t || "Failed to save booking");
          }
          return r.json();
        }

        async function apiDeleteBooking(id) {
          const r = await fetch(apiBase + "/api/bookings/" + encodeURIComponent(id), {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 404) throw new Error("Booking not found");
          if (!r.ok) throw new Error("Failed to delete booking");
          return r.json();
        }

        function countNewBookings() {
          return bookingsCache.filter((b) => b && String(b.status || "") === "new").length;
        }

        function updateBookingsBadge() {
          const el = $("navBadgeBookings");
          if (!el) return;
          const n = countNewBookings();
          el.textContent = n > 99 ? "99+" : String(n || "");
          if (n > 0) el.removeAttribute("hidden");
          else el.setAttribute("hidden", "");
        }

        async function refreshBookings() {
          bookingsCache = await apiGetBookings();
          updateBookingsBadge();
          return bookingsCache;
        }

        async function apiMarkBookingsViewed() {
          const r = await fetch(apiBase + "/api/bookings/mark-viewed", {
            method: "POST",
            headers: authHeaders(),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to update booking flags");
          return r.json();
        }

        async function apiGetSchedule() {
          const r = await fetch(apiBase + "/api/admin/schedule", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load schedule");
          return r.json();
        }

        async function apiPutSchedule(s) {
          const r = await fetch(apiBase + "/api/admin/schedule", {
            method: "PUT",
            headers: Object.assign({}, authHeaders(), { "Content-Type": "application/json" }),
            body: JSON.stringify(s),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            const t = await r.text();
            throw new Error(t || "Failed to save schedule");
          }
          return r.json();
        }

        function notifyScheduleChanged() {
          try {
            localStorage.setItem("ps-schedule-rev", String(Date.now()));
          } catch (e) {}
          try {
            new BroadcastChannel("ps-schedule").postMessage({ type: "update" });
          } catch (e) {}
        }

        let bookingsPollId = null;

        function startBookingsPolling() {
          if (bookingsPollId) clearInterval(bookingsPollId);
          bookingsPollId = setInterval(async () => {
            if (!token) return;
            try {
              await refreshBookings();
              if (activeRoute === "bookings" && typeof window.__repaintBookingsTable === "function") {
                window.__repaintBookingsTable();
              }
            } catch (e) {}
          }, 12000);
        }

        function stopBookingsPolling() {
          if (bookingsPollId) {
            clearInterval(bookingsPollId);
            bookingsPollId = null;
          }
        }

        // -----------------------------
        // Events API (separate store)
        // -----------------------------
        function adminAnalyticsSessionId() {
          try {
            var k = "ps_admin_evt_sid";
            var s = sessionStorage.getItem(k);
            if (!s) {
              s = "adm_" + Math.random().toString(36).slice(2, 14);
              sessionStorage.setItem(k, s);
            }
            return s;
          } catch (e) {
            return "adm_local";
          }
        }

        async function apiPostEvent(evt) {
          try {
            var payload = Object.assign(
              {
                session_id: adminAnalyticsSessionId(),
                page: location.pathname || "/admin",
              },
              evt || {}
            );
            const r = await fetch(apiBase + "/api/events", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify(payload),
            });
            return r.ok;
          } catch (e) {
            return false;
          }
        }

        async function apiGetEvents() {
          const r = await fetch(apiBase + "/api/events", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load events");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        // -----------------------------
        // Blog API (separate store)
        // -----------------------------
        async function apiAdminGetBlog() {
          const r = await fetch(apiBase + "/api/admin/blog", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load blog posts");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        async function apiAdminCreateBlog(post) {
          const r = await fetch(apiBase + "/api/admin/blog", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(post),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 409) throw new Error("Slug already exists");
          if (!r.ok) throw new Error("Failed to create post");
          return r.json();
        }

        async function apiAdminUpdateBlog(slug, post) {
          const r = await fetch(apiBase + "/api/admin/blog/" + encodeURIComponent(slug), {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify(post),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 409) throw new Error("Slug already exists");
          if (r.status === 404) throw new Error("Post not found");
          if (!r.ok) throw new Error("Failed to update post");
          return r.json();
        }

        async function apiAdminDeleteBlog(slug) {
          const r = await fetch(apiBase + "/api/admin/blog/" + encodeURIComponent(slug), {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 404) throw new Error("Post not found");
          if (!r.ok) throw new Error("Failed to delete post");
          return r.json();
        }

        async function apiGenerateBlog(topic, draft) {
          const r = await fetch(apiBase + "/api/generate-blog", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ topic: topic || null, draft: Boolean(draft) }),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            let msg = "Failed to generate blog";
            try {
              const j = await r.json();
              if (j && j.detail) msg = String(j.detail);
            } catch (e) {}
            throw new Error(msg);
          }
          return r.json();
        }

        async function apiGetOpenAIKeyStatus() {
          const r = await fetch(apiBase + "/api/admin/openai-key", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to read OpenAI key status");
          return r.json();
        }

        async function apiSetOpenAIKey(apiKey) {
          const r = await fetch(apiBase + "/api/admin/openai-key", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ api_key: String(apiKey || "").trim() }),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            let msg = "Failed to save key";
            try {
              const j = await r.json();
              if (j && j.detail) msg = String(j.detail);
            } catch (e) {}
            throw new Error(msg);
          }
          return r.json();
        }

        async function apiTranslate(text, sourceLang, targetLang) {
          const r = await fetch(apiBase + "/api/admin/translate", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({
              text: String(text || ""),
              source_lang: sourceLang || null,
              target_lang: String(targetLang || ""),
            }),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            let msg = "Translate failed";
            try {
              const j = await r.json();
              if (j && j.detail) msg = String(j.detail);
            } catch (e) {}
            throw new Error(msg);
          }
          return r.json();
        }

        function track(type, fields) {
